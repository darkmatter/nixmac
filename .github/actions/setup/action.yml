name: "Setup nixmac CI"
description: >
  Compatibility wrapper around phase-level setup actions. New workflow callsites
  should call setup-nix/setup-devenv/setup-xcode/setup-bun/setup-rust directly
  so GitHub logs show the expensive phases as separate steps.

inputs:
  install-bun-deps:
    description: "Run bun install --frozen-lockfile"
    required: false
    default: "true"
  install-devenv:
    description: >
      Provide the devenv profile on PATH. Set false for jobs that only need
      nix itself (e.g. nix fmt) to skip the expensive devenv eval/build.
    required: false
    default: "true"
  setup-rust:
    description: "Install Rust toolchain via dtolnay/rust-toolchain and cache"
    required: false
    default: "false"
  rust-cache-workspaces:
    description: "Workspace paths for rust-cache (comma-separated)"
    required: false
    default: ""
  extra-nix-conf:
    description: "Extra lines for /etc/nix/nix.conf (newline-separated)"
    required: false
    default: ""
  darkmatter-cachix-auth-token:
    description: "Cachix auth token for the darkmatter binary cache"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Setup Nix and caches
      uses: ./.github/actions/setup-nix
      with:
        install-devenv: ${{ inputs.install-devenv }}
        extra-nix-conf: ${{ inputs.extra-nix-conf }}
        darkmatter-cachix-auth-token: ${{ inputs.darkmatter-cachix-auth-token }}

    - name: Setup devenv profile
      if: inputs.install-devenv == 'true'
      uses: ./.github/actions/setup-devenv
      with:
        install-devenv: ${{ inputs.install-devenv }}
        darkmatter-cachix-auth-token: ${{ inputs.darkmatter-cachix-auth-token }}

    - name: Setup Xcode Swift toolchain
      if: inputs.install-devenv == 'true'
      uses: ./.github/actions/setup-xcode

    - name: Setup Bun
      if: inputs.install-bun-deps == 'true'
      uses: ./.github/actions/setup-bun

    - name: Setup Rust
      if: inputs.setup-rust == 'true'
      uses: ./.github/actions/setup-rust
      with:
        rust-cache-workspaces: ${{ inputs.rust-cache-workspaces }}

    - name: Install frontend dependencies
      if: inputs.install-bun-deps == 'true'
      shell: bash
      run: bun install --frozen-lockfile
