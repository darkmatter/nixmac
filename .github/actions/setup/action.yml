name: "Setup nixmac CI"
description: >
  Install Determinate Nix (skips if already installed), provide the devenv
  profile (bun/node/rust/sops/age/etc. on PATH), and install JS deps.
  The devenv profile's store path is cached via actions/cache keyed on the
  devenv inputs; warm runs substitute the profile from binary caches instead
  of re-evaluating devenv, which costs 5-10 minutes on ephemeral runners.
  NOTE: You MUST run actions/checkout before this action — local composite
  actions need the repo on disk before they can be resolved.

inputs:
  install-bun-deps:
    description: "Run bun install --frozen-lockfile"
    required: false
    default: "true"
  install-devenv:
    description: >
      Provide the devenv profile on PATH. Set false for jobs that only need
      nix itself (e.g. nix fmt) to skip the expensive devenv eval/build.
    required: false
    default: "true"
  setup-rust:
    description: "Install Rust toolchain via dtolnay/rust-toolchain and cache"
    required: false
    default: "false"
  rust-cache-workspaces:
    description: "Workspace paths for rust-cache (comma-separated)"
    required: false
    default: ""
  extra-nix-conf:
    description: "Extra lines for /etc/nix/nix.conf (newline-separated)"
    required: false
    default: ""
  darkmatter-cachix-auth-token:
    description: "Cachix auth token for the darkmatter binary cache"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Install Nix
      uses: DeterminateSystems/nix-installer-action@v22
      with:
        extra-conf: ${{ inputs.extra-nix-conf }}

    # continue-on-error on the cachix steps: some persistent self-hosted
    # runners have a Nix install whose runner user is not in trusted-users,
    # so `cachix use` cannot add substituters and exits 1. Degrading to
    # "build without binary caches" beats failing the whole job there.
    - name: Configure darkmatter Cachix cache
      if: ${{ inputs.darkmatter-cachix-auth-token != '' }}
      continue-on-error: true
      uses: cachix/cachix-action@v17
      with:
        name: darkmatter
        authToken: ${{ inputs.darkmatter-cachix-auth-token }}

    # Pull pre-built devenv packages from devenv.cachix.org (free, no auth).
    # This avoids building devenv and its deps from source.
    - name: Configure devenv Cachix cache
      if: ${{ inputs.install-devenv == 'true' }}
      continue-on-error: true
      uses: cachix/cachix-action@v17
      with:
        name: devenv
        skipPush: true

    # languages.python uses nixpkgs-python, whose builds are NOT on
    # cache.nixos.org. Without this cache, CI compiles CPython from source
    # (~10 minutes of gcc on GitHub-hosted runners).
    - name: Configure nixpkgs-python Cachix cache
      if: ${{ inputs.install-devenv == 'true' }}
      continue-on-error: true
      uses: cachix/cachix-action@v17
      with:
        name: nixpkgs-python
        skipPush: true

    # The devenv profile is a plain store path. Caching that path (plus the
    # env vars devenv exports) lets warm runs skip installing the devenv CLI
    # and evaluating devenv entirely — `nix build <path>` just substitutes the
    # closure from the configured binary caches. The pointer is only saved
    # after the closure has verifiably been pushed to the darkmatter cache
    # (see "Push devenv profile" below), so a cache hit implies the profile
    # is downloadable.
    # Key namespace v2: v1 pointers were saved while cachix pushes were
    # silently failing (403), so they reference paths no cache can serve.
    - name: Restore devenv profile pointer
      if: ${{ inputs.install-devenv == 'true' }}
      id: devenv-cache
      uses: actions/cache/restore@v4
      with:
        path: .devenv-ci
        key: devenv-profile-v2-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('devenv.nix', 'devenv.yaml', 'devenv.lock', 'flake.nix', 'flake.lock', 'treefmt.nix', 'nix/**') }}

    - name: Substitute cached devenv profile
      if: ${{ inputs.install-devenv == 'true' && steps.devenv-cache.outputs.cache-hit == 'true' }}
      id: devenv-realise
      shell: bash
      run: |
        set -euo pipefail

        profile_path="$(cat .devenv-ci/profile-path)"
        ok=true

        mkdir -p .devenv
        if ! nix build "$profile_path" --out-link .devenv/profile; then
          ok=false
        fi

        # Realise store paths referenced only by exported env vars (e.g.
        # PLAYWRIGHT_BROWSERS_PATH) that may live outside the profile closure.
        if [ "$ok" = "true" ] && [ -s .devenv-ci/extra-paths ]; then
          if ! xargs nix-store --realise < .devenv-ci/extra-paths > /dev/null; then
            ok=false
          fi
        fi

        if [ "$ok" != "true" ]; then
          echo "Cached devenv profile is not substitutable; falling back to a full devenv build."
          rm -f .devenv/profile
        fi
        echo "ok=$ok" >> "$GITHUB_OUTPUT"

    # `nix build` instead of `nix profile install`: no profile manifest
    # locking (concurrent jobs on shared runners contend on it), and the
    # version is pinned so a new devenv release can't change CI behavior
    # underneath us.
    - name: Install devenv
      if: ${{ inputs.install-devenv == 'true' && steps.devenv-realise.outputs.ok != 'true' }}
      shell: bash
      run: nix build github:cachix/devenv/v2.1.2 --out-link "${RUNNER_TEMP}/devenv-cli"

    - name: Build devenv profile
      if: ${{ inputs.install-devenv == 'true' && steps.devenv-realise.outputs.ok != 'true' }}
      shell: bash
      env:
        NIXPKGS_ALLOW_UNFREE: 1
      run: |
        set -euo pipefail

        # Build the devenv profile by entering the shell with a trivial command.
        # This creates .devenv/profile symlink with all packages on PATH.
        # Do NOT use `devenv ci` — it runs the test suite which may fail.
        "${RUNNER_TEMP}/devenv-cli/bin/devenv" shell --impure -- echo ready

    - name: Record devenv profile pointer
      if: ${{ inputs.install-devenv == 'true' && steps.devenv-realise.outputs.ok != 'true' }}
      shell: bash
      env:
        NIXPKGS_ALLOW_UNFREE: 1
      run: |
        set -euo pipefail

        mkdir -p .devenv-ci
        readlink -f .devenv/profile > .devenv-ci/profile-path

        "${RUNNER_TEMP}/devenv-cli/bin/devenv" shell --impure -- bash -c '
          for name in \
            LD_LIBRARY_PATH \
            LIBRARY_PATH \
            PLAYWRIGHT_BROWSERS_PATH \
            PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD \
            RUSTFLAGS
          do
            value="${!name:-}"
            if [ -n "$value" ]; then
              printf "%s=%s\n" "$name" "$value"
            fi
          done
        ' > .devenv-ci/env 2>/dev/null

        # Trim env values like /nix/store/<hash>-pkg/lib down to the top-level
        # store path — nix-store --realise only accepts store path roots.
        grep -oE '/nix/store/[a-z0-9]{32}-[^:/" ]+' .devenv-ci/env | sort -u > .devenv-ci/extra-paths || true

    # Push the profile closure synchronously and verify it is actually
    # downloadable before trusting it. cachix-action's post-job push is not
    # enough: it swallows per-path API errors (e.g. 403 from a token without
    # write permission) and reports success, which would poison the pointer
    # cache with paths nothing can serve.
    - name: Push devenv profile to darkmatter Cachix
      if: ${{ inputs.install-devenv == 'true' && steps.devenv-realise.outputs.ok != 'true' }}
      id: devenv-push
      shell: bash
      env:
        CACHIX_AUTH_TOKEN: ${{ inputs.darkmatter-cachix-auth-token }}
      run: |
        set -euo pipefail

        ok=false
        profile_path="$(cat .devenv-ci/profile-path)"

        if [ -z "${CACHIX_AUTH_TOKEN:-}" ]; then
          echo "::warning::No darkmatter Cachix auth token; skipping devenv profile push, the profile pointer will not be cached."
        elif ! command -v cachix > /dev/null; then
          echo "::warning::cachix is not on PATH; skipping devenv profile push, the profile pointer will not be cached."
        else
          if { echo "$profile_path"; cat .devenv-ci/extra-paths; } | xargs cachix push darkmatter; then
            # Belt and braces: confirm the profile narinfo is really served.
            # Pushes have failed silently before while reporting success.
            if nix path-info --store https://darkmatter.cachix.org "$profile_path" > /dev/null 2>&1; then
              ok=true
            else
              echo "::warning::devenv profile push reported success but ${profile_path} is not downloadable from darkmatter.cachix.org; the profile pointer will not be cached. Check that DARKMATTER_CACHIX_AUTH_TOKEN has write permission."
            fi
          else
            echo "::warning::cachix push to darkmatter failed; the profile pointer will not be cached. Check that DARKMATTER_CACHIX_AUTH_TOKEN has write permission."
          fi
        fi

        echo "ok=$ok" >> "$GITHUB_OUTPUT"

    - name: Save devenv profile pointer
      if: ${{ inputs.install-devenv == 'true' && steps.devenv-push.outputs.ok == 'true' && steps.devenv-cache.outputs.cache-hit != 'true' }}
      uses: actions/cache/save@v4
      with:
        path: .devenv-ci
        key: ${{ steps.devenv-cache.outputs.cache-primary-key }}

    - name: Add devenv tools to PATH
      if: ${{ inputs.install-devenv == 'true' }}
      shell: bash
      run: |
        set -euo pipefail

        # .devenv/profile is a symlink to the nix store path containing all
        # packages (bun, node, sops, age, rust, etc.)
        if [[ -L .devenv/profile ]]; then
          profile_path="$(readlink -f .devenv/profile)"
          echo "${profile_path}/bin" >> "$GITHUB_PATH"
        else
          echo "ERROR: .devenv/profile symlink not found"
          exit 1
        fi

    - name: Export devenv environment
      if: ${{ inputs.install-devenv == 'true' }}
      shell: bash
      run: |
        set -euo pipefail

        cat .devenv-ci/env >> "$GITHUB_ENV"

    - name: Install Rust toolchain
      if: inputs.setup-rust == 'true'
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Rust artifacts
      if: inputs.setup-rust == 'true' && inputs.rust-cache-workspaces != ''
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: ${{ inputs.rust-cache-workspaces }}

    - name: Install frontend dependencies
      if: inputs.install-bun-deps == 'true'
      shell: bash
      run: bun install --frozen-lockfile
