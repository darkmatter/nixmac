name: "Setup nixmac CI"
description: >
  Install Determinate Nix (skips if already installed), build the devenv profile
  via `devenv shell` to get bun/node/rust/sops/age/etc. on PATH, and install JS
  NOTE: You MUST run actions/checkout before this action — local composite
  actions need the repo on disk before they can be resolved.

inputs:
  install-bun-deps:
    description: "Run bun install --frozen-lockfile"
    required: false
    default: "true"
  setup-rust:
    description: "Install Rust toolchain via dtolnay/rust-toolchain and cache"
    required: false
    default: "false"
  rust-cache-workspaces:
    description: "Workspace paths for rust-cache (comma-separated)"
    required: false
    default: ""
  extra-nix-conf:
    description: "Extra lines for /etc/nix/nix.conf (newline-separated)"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Install Nix
      uses: DeterminateSystems/nix-installer-action@v22
      with:
        extra-conf: ${{ inputs.extra-nix-conf }}

    # Pull pre-built devenv packages from devenv.cachix.org (free, no auth).
    # This avoids building devenv and its deps from source.
    - name: Configure devenv Cachix cache
      uses: cachix/cachix-action@v17
      with:
        name: devenv
        skipPush: true

    # Cache the full nix store in GitHub Actions cache (free, 10GB limit).
    # Primary cold-start speedup: restores /nix/store from GHA cache
    # so subsequent runs skip downloads entirely.
    - name: Restore nix store cache
      uses: nix-community/cache-nix-action@v7
      with:
        primary-key: nix-${{ runner.os }}-${{ hashFiles('devenv.lock', 'devenv.nix', 'devenv.yaml') }}
        restore-prefixes-first-match: nix-${{ runner.os }}-
        gc-max-store-size-macos: 7500000000
        gc-max-store-size-linux: 7500000000
    continue-on-error: true

    - name: Install devenv
      shell: bash
      run: nix profile install --profile /tmp/devenv-profile github:cachix/devenv/latest

    - name: Build devenv profile
      shell: bash
      run: |
        set -euo pipefail

        # Build the devenv profile by entering the shell with a trivial command.
        # This creates .devenv/profile symlink with all packages on PATH.
        # Do NOT use `devenv ci` — it runs the test suite which may fail.
        /tmp/devenv-profile/bin/devenv shell echo ready

    - name: Add devenv tools to PATH
      shell: bash
      run: |
        set -euo pipefail

        # After `devenv shell`, .devenv/profile is a symlink to the nix store path
        # containing all packages (bun, node, sops, age, rust, etc.)
        if [[ -L .devenv/profile ]]; then
          profile_path="$(readlink -f .devenv/profile)"
          echo "${profile_path}/bin" >> "$GITHUB_PATH"
        else
          echo "ERROR: .devenv/profile symlink not found after devenv shell"
          exit 1
        fi

        # Also add the devenv CLI itself to PATH for potential later use
        echo "/tmp/devenv-profile/bin" >> "$GITHUB_PATH"

    - name: Install Rust toolchain
      if: inputs.setup-rust == 'true'
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Rust artifacts
      if: inputs.setup-rust == 'true' && inputs.rust-cache-workspaces != ''
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: ${{ inputs.rust-cache-workspaces }}

    - name: Install frontend dependencies
      if: inputs.install-bun-deps == 'true'
      shell: bash
      run: bun install --frozen-lockfile
