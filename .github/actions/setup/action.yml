name: "Setup nixmac CI"
description: >
  Install Determinate Nix (skips if already installed), build the devenv profile
  via `devenv ci` to get bun/node/rust/sops/age/etc. on PATH, and install JS
  NOTE: You MUST run actions/checkout before this action — local composite
  actions need the repo on disk before they can be resolved.

inputs:
  install-bun-deps:
    description: "Run bun install --frozen-lockfile"
    required: false
    default: "true"
  setup-rust:
    description: "Install Rust toolchain via dtolnay/rust-toolchain and cache"
    required: false
    default: "false"
  rust-cache-workspaces:
    description: "Workspace paths for rust-cache (comma-separated)"
    required: false
    default: ""
  extra-nix-conf:
    description: "Extra lines for /etc/nix/nix.conf (newline-separated)"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Install Nix
      uses: DeterminateSystems/nix-installer-action@v22
      with:
        extra-conf: ${{ inputs.extra-nix-conf }}

    - name: Cache nix store
      uses: DeterminateSystems/flakehub-cache-action@v1
      continue-on-error: true

    - name: Install devenv
      shell: bash
      run: nix profile install --profile /tmp/devenv-profile github:cachix/devenv/latest

    - name: Build devenv profile
      shell: bash
      run: |
        set -euo pipefail

        # Build the devenv profile (installs all packages but does not enter a shell).
        # This is the CI-optimized path — much faster than `devenv shell`.
        /tmp/devenv-profile/bin/devenv ci

    - name: Add devenv tools to PATH
      shell: bash
      run: |
        set -euo pipefail

        # After `devenv ci`, .devenv/profile is a symlink to the nix store path
        # containing all packages (bun, node, sops, age, rust, etc.)
        if [[ -L .devenv/profile ]]; then
          profile_path="$(readlink -f .devenv/profile)"
          echo "${profile_path}/bin" >> "$GITHUB_PATH"
        else
          echo "ERROR: .devenv/profile symlink not found after devenv ci"
          exit 1
        fi

        # Also add the devenv CLI itself to PATH for potential later use
        echo "/tmp/devenv-profile/bin" >> "$GITHUB_PATH"

    - name: Install Rust toolchain
      if: inputs.setup-rust == 'true'
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Rust artifacts
      if: inputs.setup-rust == 'true' && inputs.rust-cache-workspaces != ''
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: ${{ inputs.rust-cache-workspaces }}

    - name: Install frontend dependencies
      if: inputs.install-bun-deps == 'true'
      shell: bash
      run: bun install --frozen-lockfile
