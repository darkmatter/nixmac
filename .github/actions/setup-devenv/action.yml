name: "Setup devenv profile"
description: "Restore or build the devenv profile and export its environment."

inputs:
  install-devenv:
    description: "Provide the devenv profile on PATH."
    required: false
    default: "true"
  darkmatter-cachix-auth-token:
    description: "Cachix auth token for pushing/verifying the darkmatter binary cache."
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    # The devenv profile is a plain store path. Caching that path (plus the
    # env vars devenv exports) lets warm runs skip installing the devenv CLI
    # and evaluating devenv entirely — `nix build <path>` just substitutes the
    # closure from the configured binary caches. The pointer is only saved
    # after the closure has verifiably been pushed to the darkmatter cache
    # (see "Push devenv profile" below), so a cache hit implies the profile
    # is downloadable.
    # Key namespace v2: v1 pointers were saved while cachix pushes were
    # silently failing (403), so they reference paths no cache can serve.
    # Fast path: on self-hosted runners with clean:false, .devenv/profile
    # persists between runs. If the symlink resolves to a valid nix store
    # path, skip the entire cache restore + substitute + build chain.
    - name: Check existing devenv profile
      if: ${{ inputs.install-devenv == 'true' }}
      id: devenv-existing
      shell: bash
      run: |
        set -euo pipefail
        if [[ -L .devenv/profile ]]; then
          profile_path="$(readlink -f .devenv/profile)"
          if nix path-info "$profile_path" >/dev/null 2>&1; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
            echo "profile_path=$profile_path" >> "$GITHUB_OUTPUT"
            echo "✓ Existing devenv profile is valid: $profile_path"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::notice::devenv/profile store path is gone; rebuilding."
          fi
        else
          echo "ok=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Restore devenv profile pointer
      if: ${{ inputs.install-devenv == 'true' && steps.devenv-existing.outputs.ok != 'true' }}
      id: devenv-cache
      uses: actions/cache/restore@v4
      with:
        path: .devenv-ci
        key: devenv-profile-v2-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('devenv.nix', 'devenv.yaml', 'devenv.lock', 'flake.nix', 'flake.lock', 'treefmt.nix', 'nix/**') }}

    - name: Substitute cached devenv profile
      if: ${{ inputs.install-devenv == 'true' && steps.devenv-existing.outputs.ok != 'true' && steps.devenv-cache.outputs.cache-hit == 'true' }}
      id: devenv-realise
      shell: bash
      run: |
        set -euo pipefail

        profile_path="$(cat .devenv-ci/profile-path)"
        ok=true

        mkdir -p .devenv
        if nix path-info "$profile_path" >/dev/null 2>&1; then
          ln -sfn "$profile_path" .devenv/profile
          echo "Profile already in local nix store; linked without download."
        elif ! nix build "$profile_path" --out-link .devenv/profile; then
          ok=false
        fi

        # Realise store paths referenced only by exported env vars (e.g.
        # PLAYWRIGHT_BROWSERS_PATH) that may live outside the profile closure.
        if [ "$ok" = "true" ] && [ -s .devenv-ci/extra-paths ]; then
          if ! xargs nix-store --realise < .devenv-ci/extra-paths > /dev/null; then
            ok=false
          fi
        fi

        if [ "$ok" != "true" ]; then
          echo "Cached devenv profile is not substitutable; falling back to a full devenv build."
          rm -f .devenv/profile
        fi
        echo "ok=$ok" >> "$GITHUB_OUTPUT"

    # `nix build` instead of `nix profile install`: no profile manifest
    # locking (concurrent jobs on shared runners contend on it), and the
    # version is pinned so a new devenv release can't change CI behavior
    # underneath us.
    - name: Install devenv
      if: ${{ inputs.install-devenv == 'true' && steps.devenv-existing.outputs.ok != 'true' && steps.devenv-realise.outputs.ok != 'true' }}
      shell: bash
      run: nix build github:cachix/devenv/v2.1.2 --out-link "${RUNNER_TEMP}/devenv-cli"

    - name: Build devenv profile
      if: ${{ inputs.install-devenv == 'true' && steps.devenv-existing.outputs.ok != 'true' && steps.devenv-realise.outputs.ok != 'true' }}
      shell: bash
      env:
        NIXPKGS_ALLOW_UNFREE: 1
        XDG_DATA_HOME: ${{ runner.temp }}/devenv-xdg-data
      run: |
        set -euo pipefail
        "${RUNNER_TEMP}/devenv-cli/bin/devenv" shell --impure -- echo ready

    - name: Record devenv profile pointer
      if: ${{ inputs.install-devenv == 'true' && steps.devenv-existing.outputs.ok != 'true' && steps.devenv-realise.outputs.ok != 'true' }}
      shell: bash
      env:
        NIXPKGS_ALLOW_UNFREE: 1
        # Must match the Build step so devenv reuses the same state dir.
        XDG_DATA_HOME: ${{ runner.temp }}/devenv-xdg-data
      run: |
        set -euo pipefail

        mkdir -p .devenv-ci
        readlink -f .devenv/profile > .devenv-ci/profile-path

        # enterShell hooks (e.g. devenv's automatic `bun install`) write to
        # stdout too, so a bare redirect would poison the env file with lines
        # GITHUB_ENV can't parse. Keep only the KEY=value lines we asked for.
        "${RUNNER_TEMP}/devenv-cli/bin/devenv" shell --impure -- bash -c '
          for name in \
            FONTCONFIG_FILE \
            LD_LIBRARY_PATH \
            LIBRARY_PATH \
            PLAYWRIGHT_BROWSERS_PATH \
            PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD \
            RUSTFLAGS
          do
            value="${!name:-}"
            if [ -n "$value" ]; then
              printf "%s=%s\n" "$name" "$value"
            fi
          done
        ' 2>/dev/null \
          | grep -E '^(FONTCONFIG_FILE|LD_LIBRARY_PATH|LIBRARY_PATH|PLAYWRIGHT_BROWSERS_PATH|PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD|RUSTFLAGS)=' \
          > .devenv-ci/env || true

        # Trim env values like /nix/store/<hash>-pkg/lib down to the top-level
        # store path — nix-store --realise only accepts store path roots.
        grep -oE '/nix/store/[a-z0-9]{32}-[^:/" ]+' .devenv-ci/env | sort -u > .devenv-ci/extra-paths || true

        # Realise env-referenced store paths (e.g. PLAYWRIGHT_BROWSERS_PATH)
        # right away: they live outside the profile closure, and `devenv
        # shell` does not realise paths that only appear in exported env
        # values. On persistent runners they usually pre-exist; on ephemeral
        # runners (ARC pods) they don't, and later steps that launch
        # Playwright fail with "Executable doesn't exist". Realising here
        # also lets the push step below actually upload them.
        if [ -s .devenv-ci/extra-paths ]; then
          xargs nix-store --realise < .devenv-ci/extra-paths > /dev/null
        fi

    # Push the profile closure synchronously and verify it is actually
    # downloadable before trusting it. cachix-action's post-job push is not
    # enough: it swallows per-path API errors (e.g. 403 from a token without
    # write permission) and reports success, which would poison the pointer
    # cache with paths nothing can serve.
    - name: Push devenv profile to darkmatter Cachix
      if: ${{ inputs.install-devenv == 'true' && steps.devenv-existing.outputs.ok != 'true' && steps.devenv-realise.outputs.ok != 'true' }}
      id: devenv-push
      shell: bash
      env:
        CACHIX_AUTH_TOKEN: ${{ inputs.darkmatter-cachix-auth-token }}
      run: |
        set -euo pipefail

        ok=false
        profile_path="$(cat .devenv-ci/profile-path)"

        if [ -z "${CACHIX_AUTH_TOKEN:-}" ]; then
          echo "::notice::No darkmatter Cachix auth token; skipping push. Pointer will still be saved for self-hosted runners."
        elif ! command -v cachix > /dev/null; then
          echo "::notice::cachix is not on PATH; skipping push. Pointer will still be saved for self-hosted runners."
        else
          if { echo "$profile_path"; cat .devenv-ci/extra-paths; } | xargs cachix push darkmatter; then
            if nix path-info --store https://darkmatter.cachix.org "$profile_path" > /dev/null 2>&1; then
              ok=true
            else
              echo "::warning::devenv profile push reported success but ${profile_path} is not downloadable from darkmatter.cachix.org."
            fi
          else
            echo "::warning::cachix push to darkmatter failed."
          fi
        fi

        echo "ok=$ok" >> "$GITHUB_OUTPUT"

    # Save the pointer unconditionally after a build — on self-hosted runners
    # the nix store persists locally, so the path is valid even without cachix.
    # The cachix push is only needed for ephemeral (GitHub-hosted) runners.
    - name: Save devenv profile pointer
      if: ${{ inputs.install-devenv == 'true' && steps.devenv-existing.outputs.ok != 'true' && steps.devenv-realise.outputs.ok != 'true' && steps.devenv-cache.outputs.cache-hit != 'true' }}
      uses: actions/cache/save@v4
      with:
        path: .devenv-ci
        key: ${{ steps.devenv-cache.outputs.cache-primary-key }}

    - name: Add devenv tools to PATH
      if: ${{ inputs.install-devenv == 'true' }}
      shell: bash
      run: |
        set -euo pipefail

        # .devenv/profile is a symlink to the nix store path containing all
        # packages (bun, node, sops, age, rust, etc.)
        if [[ -L .devenv/profile ]]; then
          profile_path="$(readlink -f .devenv/profile)"
          echo "${profile_path}/bin" >> "$GITHUB_PATH"
        else
          echo "ERROR: .devenv/profile symlink not found"
          exit 1
        fi

    - name: Export devenv environment
      if: ${{ inputs.install-devenv == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        # Filter defensively: caches saved before the env file was sanitized
        # may contain stray enterShell output that GITHUB_ENV rejects.
        if [[ -f .devenv-ci/env ]]; then
          grep -E '^[A-Z_][A-Z0-9_]*=' .devenv-ci/env >> "$GITHUB_ENV" || true
        fi
