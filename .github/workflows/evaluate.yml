name: Evaluate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
  workflow_dispatch:

concurrency:
  group: evaluate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read


env:
  CARGO_INCREMENTAL: 0
  RUSTUP_INIT_SKIP_PATH_CHECK: yes

jobs:
  rust-check:
    name: Rust Check
    runs-on: [self-hosted, macos-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        continue-on-error: true
      - name: Install devenv
        run: nix profile install --accept-flake-config nixpkgs#devenv 2>/dev/null || true
      - name: Check Rust app crate
        working-directory: apps/native/src-tauri
        shell: devenv shell -- bash -e {0}
        run: cargo check --locked

  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        continue-on-error: true
      - name: Install devenv
        run: nix profile install --accept-flake-config nixpkgs#devenv 2>/dev/null || true
      - name: Install dependencies
        shell: devenv shell -- bash -e {0}
        run: bun install --frozen-lockfile
      - name: Type-check native app
        working-directory: apps/native
        shell: devenv shell -- bash -e {0}
        run: bunx tsc --noEmit

  treefmt:
    name: Treefmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.6
      - name: Check changed Nix and shell files
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail

          base="${BASE_SHA:-}"
          if [ -z "$base" ]; then
            base="$(git rev-parse HEAD^)"
          fi

          git diff -z --name-only --diff-filter=ACMR "$base" HEAD -- '*.nix' '*.sh' > /tmp/treefmt-files

          if [ ! -s /tmp/treefmt-files ]; then
            echo "No treefmt-covered files changed."
            exit 0
          fi

          xargs -0 nix fmt -- --ci --formatters nixfmt --formatters shellcheck < /tmp/treefmt-files
