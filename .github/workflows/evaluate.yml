name: Evaluate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
  # Post-merge tripwire: re-run cargo check on develop itself so any compile
  # breakage that slips past the pre-merge gate (merge-queue edge cases, the
  # main->develop merge producing a broken tree from two green parents, a
  # ruleset change) turns develop's commit status red quickly instead of
  # costing the next person a confusing local build failure. Only the Rust
  # Check job runs on push (see the per-job `if` guards below); the full build
  # already gates the PR path.
  push:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: evaluate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write
  packages: read

jobs:
  rust-check:
    name: Rust Check
    runs-on: [self-hosted, macOS]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # cargo check needs only the Rust toolchain plus the system C compiler
      # (libgit2-sys / libsqlite3-sys build their vendored C with `cc`). It does
      # not need the devenv profile (node/bun/sops/python) or JS deps, so skip
      # both — that drops the ~8 min devenv provisioning to a ~1 min toolchain
      # setup. This speeds up the PR check too; the full build (build.yaml) is
      # unaffected and still provides heavyweight coverage.
      - uses: ./.github/actions/setup
        with:
          darkmatter-cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          setup-rust: true
          rust-cache-workspaces: apps/native/src-tauri
          install-devenv: false
          install-bun-deps: false
      - name: Check Rust app crate
        working-directory: apps/native/src-tauri
        run: |
          # Download all crates first so we can patch before check.
          cargo fetch --locked
          # tauri-plugin-macos-passkey 0.1.0 declares swift-tools-version 6.1
          # but the self-hosted runner has Swift 6.0.2 (Xcode 16.1). The code
          # doesn't use 6.1 features, so patch the Package.swift down to 6.0.
          PASSKEY_SWIFT=$(find ~/.cargo/registry/src -path "*tauri-plugin-macos-passkey*/swift-lib/Package.swift" 2>/dev/null | head -1)
          if [ -n "$PASSKEY_SWIFT" ]; then
            sed -i '' 's/swift-tools-version: 6.1/swift-tools-version: 6.0/' "$PASSKEY_SWIFT"
            echo "Patched $PASSKEY_SWIFT"
          else
            echo "WARNING: PasskeyBridge Package.swift not found"
          fi
          cargo check --locked

  typescript:
    name: TypeScript
    if: github.event_name != 'push'
    runs-on: [self-hosted, linux]
    container:
      image: ghcr.io/darkmatter/nixmac-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install frontend dependencies
        # Non-frozen: CI ubuntu resolves 2 fewer platform-specific packages
        # than darwin, causing frozen-lockfile to reject the committed lockfile.
        # The lockfile is correct on darwin + docker linux; the discrepancy is
        # a bun/setup-bun interaction we can't reproduce locally. Non-frozen
        # lets CI install + tsc without blocking on this.
        run: bun install

      - name: Type-check native app
        working-directory: apps/native
        run: bunx tsc --noEmit

  treefmt:
    name: Treefmt
    if: github.event_name != 'push'
    runs-on: [self-hosted, linux]
    container:
      image: ghcr.io/darkmatter/nixmac-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup
        with:
          darkmatter-cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          install-bun-deps: false
          install-devenv: false
      - name: Check changed Nix and shell files
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail

          base="${BASE_SHA:-}"
          if [ -z "$base" ]; then
            base="$(git rev-parse HEAD^)"
          fi

          git diff -z --name-only --diff-filter=ACMR "$base" HEAD -- '*.nix' '*.sh' > /tmp/treefmt-files

          if [ ! -s /tmp/treefmt-files ]; then
            echo "No treefmt-covered files changed."
            exit 0
          fi

          xargs -0 nix fmt -- --ci --formatters nixfmt --formatters shellcheck < /tmp/treefmt-files
