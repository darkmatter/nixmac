name: Nightly Release

# Nightly cron that merges develop → main and tags a minor version bump.
# Skips when no changes between main and develop touch the `native` build
# graph (target workspace + transitive workspace:* deps + global build
# inputs like bun.lock and Cargo.toml) — the no-turbo equivalent of
# `turbo run build --affected --filter=native`. So a night with only
# docs/CI/release-script changes on develop is a no-op, not a release.
#
# The actual ship work is delegated to build.yaml, which triggers on the
# `v*` tag this job pushes. See ops/scripts/release/nightly-release.sh for
# the merge + tag logic, and ops/scripts/release/compute-version.sh for
# the tag-aware skip that prevents double-builds when both main and a
# tag are pushed at the same time.
#
# PREREQUISITE: This workflow pushes commits to main, which the repo's
# branch ruleset normally blocks (see build.yaml lines 157-160 for the
# tag-only workaround). For nightly-release to succeed you need ONE of:
#   - A `RELEASE_BOT_TOKEN` secret holding a PAT with admin/bypass rights
#   - A repo ruleset bypass for the `github-actions[bot]` actor on main
# Without one of these, the `git push --atomic` step will fail. The
# workflow falls back to GITHUB_TOKEN if RELEASE_BOT_TOKEN isn't set —
# useful for testing the cron + script wiring before granting bypass.

on:
  schedule:
    # 09:00 UTC = 02:00 PT / 05:00 ET. Tweak this if you want builds
    # finishing closer to the start of your workday.
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (print actions, don't push)"
        type: boolean
        default: false

# Prevent two release attempts from racing — a scheduled run plus a manual
# workflow_dispatch could otherwise compute the same next tag, race on the
# atomic push, and produce one noisy failure for no reason. cancel-in-progress
# is false because aborting a half-completed merge+tag job mid-flight is
# riskier than letting it finish.
concurrency:
  group: nightly-release
  cancel-in-progress: false

jobs:
  nightly-release:
    runs-on: arc
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Full history needed for `git describe --tags` and merge.
          fetch-depth: 0
          # Use the bot token if available so the push can bypass the
          # branch ruleset. Falls back to the workflow's auto-injected
          # token via `github.token` (canonical context form — survives
          # || fallback cases where `secrets.GITHUB_TOKEN` can resolve
          # to empty), which can push tags but cannot push commits to
          # a protected main.
          token: ${{ secrets.RELEASE_BOT_TOKEN || github.token }}
          persist-credentials: true

      - uses: ./.github/actions/setup
        with:
          darkmatter-cachix-auth-token: ${{ secrets.DARKMATTER_CACHIX_AUTH_TOKEN }}
          install-bun-deps: false

      - name: Run nightly release
        env:
          # Gate `inputs.dry_run` on the event name — `inputs.*` is only
          # populated for `workflow_dispatch`. Cron runs reliably get '0'
          # regardless of how GitHub resolves missing inputs context.
          DRY_RUN: ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '1' || '0' }}
          GIT_USER_NAME: "github-actions[bot]"
          GIT_USER_EMAIL: "41898282+github-actions[bot]@users.noreply.github.com"
        run: bash ops/scripts/release/nightly-release.sh
