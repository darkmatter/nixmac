name: "Chromatic"

on: push

jobs:
  chromatic:
    name: Run Chromatic
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.2

      - name: Install sops
        run: |
          case "$(uname -m)" in
            x86_64) SOPS_ARCH="amd64" ;;
            aarch64|arm64) SOPS_ARCH="arm64" ;;
            *)
              echo "::error::Unsupported architecture: $(uname -m)"
              exit 1
              ;;
          esac

          curl -fsSL "https://github.com/getsops/sops/releases/download/v3.12.1/sops-v3.12.1.linux.${SOPS_ARCH}" -o /tmp/sops
          sudo install -m 0755 /tmp/sops /usr/local/bin/sops
          sops --version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve Secrets
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          SECRETS_FILE=".secrets.enc.yaml"
          if [ ! -f "$SECRETS_FILE" ]; then
            echo "::error::SOPS secrets file not found at $SECRETS_FILE"
            exit 1
          fi
          # Decrypt and mask secrets so they don't leak in logs
          CHROMATIC_PROJECT_TOKEN=$(sops -d --extract '["CHROMATIC_PROJECT_TOKEN"]' "$SECRETS_FILE")

          echo "::add-mask::$CHROMATIC_PROJECT_TOKEN"

          {
            echo "CHROMATIC_PROJECT_TOKEN=$CHROMATIC_PROJECT_TOKEN"
          } >> "$GITHUB_ENV"

      - name: Run Chromatic
        working-directory: apps/native
        env:
          CHROMATIC_PROJECT_TOKEN: ${{ env.CHROMATIC_PROJECT_TOKEN }}
        run: bunx chromatic --project-token="$CHROMATIC_PROJECT_TOKEN" --exit-zero-on-changes
