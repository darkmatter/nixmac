name: "publish"
on:
  workflow_dispatch:
  push:
    branches:
      - release
jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest" # for Arm based macs (M1 and above).
            args: "--target aarch64-apple-darwin"
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Inject Sentry configuration into job env
        run: |
          SHORT_SHA=${GITHUB_SHA::8}
          PKG_VERSION=$(node -p "require('./apps/native/package.json').version")
          VERSION="${PKG_VERSION}-${SHORT_SHA}"

          echo "SENTRY_DSN=${{ secrets.SENTRY_DSN }}" >> $GITHUB_ENV
          echo "NIXMAC_ENV=prod" >> $GITHUB_ENV
          echo "NIXMAC_VERSION=${{ env.VERSION }}" >> $GITHUB_ENV

          echo "VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}" >> $GITHUB_ENV
          echo "VITE_NIXMAC_ENV=prod" >> $GITHUB_ENV
          echo "VITE_NIXMAC_VERSION=${{ env.VERSION }}" >> $GITHUB_ENV
      - name: setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "pnpm"
      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable # Set this to dtolnay/rust-toolchain@nightly
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
      - name: install frontend dependencies
        run: pnpm install # change this to npm or pnpm depending on which one you use.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Pass DSNs and build metadata into the tauri action step so build.rs can read them
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          NIXMAC_ENV: prod
          NIXMAC_VERSION: ${{ env.VERSION }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_NIXMAC_ENV: prod
          VITE_NIXMAC_VERSION: ${{ env.VERSION }}
        with:
          tagName: app-v__VERSION__ # the action automatically replaces \_\_VERSION\_\_ with the app version.
          releaseName: "App v__VERSION__"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
