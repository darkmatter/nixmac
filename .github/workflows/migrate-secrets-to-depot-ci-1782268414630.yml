name: Import secrets and variables to Depot CI
on: push

permissions:
  id-token: write
  contents: read

jobs:
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: depot/setup-action@v1
      - name: Import secrets
        env:
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          DARKMATTER_APP_ID: ${{ secrets.DARKMATTER_APP_ID }}
          DARKMATTER_APP_PRIVATE_KEY: ${{ secrets.DARKMATTER_APP_PRIVATE_KEY }}
          DARKMATTER_CACHIX_AUTH_TOKEN: ${{ secrets.DARKMATTER_CACHIX_AUTH_TOKEN }}
          GRAPHITE_TOKEN: ${{ secrets.GRAPHITE_TOKEN }}
          LINEAR_ACCESS_KEY: ${{ secrets.LINEAR_ACCESS_KEY }}
          MAC_E2E_ADMIN_PASSWORD: ${{ secrets.MAC_E2E_ADMIN_PASSWORD }}
          MAC_E2E_HOST: ${{ secrets.MAC_E2E_HOST }}
          MAC_E2E_SSH_KEY: ${{ secrets.MAC_E2E_SSH_KEY }}
          MAC_E2E_USER: ${{ secrets.MAC_E2E_USER }}
          NIXMAC_E2E_OPENROUTER_API_KEY: ${{ secrets.NIXMAC_E2E_OPENROUTER_API_KEY }}
          NIXMAC_E2E_REMOTE_HOST: ${{ secrets.NIXMAC_E2E_REMOTE_HOST }}
          NIXMAC_E2E_REMOTE_KNOWN_HOSTS: ${{ secrets.NIXMAC_E2E_REMOTE_KNOWN_HOSTS }}
          NIXMAC_E2E_REMOTE_SSH_KEY: ${{ secrets.NIXMAC_E2E_REMOTE_SSH_KEY }}
          NIXMAC_E2E_REMOTE_USER: ${{ secrets.NIXMAC_E2E_REMOTE_USER }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
          SOPS_AGE_KEY_DRKMTTR_DEV: ${{ secrets.SOPS_AGE_KEY_DRKMTTR_DEV }}
          SUBMITTED_FEEDBACK_DSN: ${{ secrets.SUBMITTED_FEEDBACK_DSN }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_SERVER_URL: ${{ secrets.VITE_SERVER_URL }}
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          unset DEPOT_TOKEN
          depot ci secrets add CHROMATIC_PROJECT_TOKEN="$CHROMATIC_PROJECT_TOKEN" DARKMATTER_APP_ID="$DARKMATTER_APP_ID" DARKMATTER_APP_PRIVATE_KEY="$DARKMATTER_APP_PRIVATE_KEY" DARKMATTER_CACHIX_AUTH_TOKEN="$DARKMATTER_CACHIX_AUTH_TOKEN" GRAPHITE_TOKEN="$GRAPHITE_TOKEN" LINEAR_ACCESS_KEY="$LINEAR_ACCESS_KEY" MAC_E2E_ADMIN_PASSWORD="$MAC_E2E_ADMIN_PASSWORD" MAC_E2E_HOST="$MAC_E2E_HOST" MAC_E2E_SSH_KEY="$MAC_E2E_SSH_KEY" MAC_E2E_USER="$MAC_E2E_USER" NIXMAC_E2E_OPENROUTER_API_KEY="$NIXMAC_E2E_OPENROUTER_API_KEY" NIXMAC_E2E_REMOTE_HOST="$NIXMAC_E2E_REMOTE_HOST" NIXMAC_E2E_REMOTE_KNOWN_HOSTS="$NIXMAC_E2E_REMOTE_KNOWN_HOSTS" NIXMAC_E2E_REMOTE_SSH_KEY="$NIXMAC_E2E_REMOTE_SSH_KEY" NIXMAC_E2E_REMOTE_USER="$NIXMAC_E2E_REMOTE_USER" SENTRY_DSN="$SENTRY_DSN" SOPS_AGE_KEY="$SOPS_AGE_KEY" SOPS_AGE_KEY_DRKMTTR_DEV="$SOPS_AGE_KEY_DRKMTTR_DEV" SUBMITTED_FEEDBACK_DSN="$SUBMITTED_FEEDBACK_DSN" VITE_SENTRY_DSN="$VITE_SENTRY_DSN" VITE_SERVER_URL="$VITE_SERVER_URL" CODECOV_TOKEN="$CODECOV_TOKEN" DEPLOY_SSH_KEY="$DEPLOY_SSH_KEY" OPENROUTER_API_KEY="$OPENROUTER_API_KEY" OP_SERVICE_ACCOUNT_TOKEN="$OP_SERVICE_ACCOUNT_TOKEN" --repo darkmatter/nixmac
  variables:
    runs-on: ubuntu-latest
    steps:
      - uses: depot/setup-action@v1
      - name: Import variables
        env:
          NIXMAC_E2E_OPENROUTER_MODEL: ${{ vars.NIXMAC_E2E_OPENROUTER_MODEL }}
          NIXMAC_E2E_REMOTE_LOCAL_HOSTNAME: ${{ vars.NIXMAC_E2E_REMOTE_LOCAL_HOSTNAME }}
        run: |
          unset DEPOT_TOKEN
          depot ci vars add NIXMAC_E2E_OPENROUTER_MODEL="$NIXMAC_E2E_OPENROUTER_MODEL" NIXMAC_E2E_REMOTE_LOCAL_HOSTNAME="$NIXMAC_E2E_REMOTE_LOCAL_HOSTNAME" --repo darkmatter/nixmac
