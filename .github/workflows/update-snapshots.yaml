name: Update Snapshots

# Regenerates Storybook snapshot baselines and opens a PR when they drift.
# Triggers:
#   - workflow_dispatch (manual, link posted in PR comments)
#   - issue_comment.edited: when a user checks the "Click here to accept
#     these changes" checkbox on a sticky Storybook preview comment
# The workflow:
#   1. Checks out the PR head (issue_comment) or main (dispatch)
#   2. Runs `bun run test:update-snapshots` (vitest --update)
#   3. If any __snapshots__ files changed, commits to the PR branch
#      (issue_comment) or opens/updates a PR against main (dispatch)
# The PR is labelled `snapshots` so it's easy to find and review.

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to update snapshots on (defaults to main)"
        required: false
        type: string
  issue_comment:
    types: [edited]

concurrency:
  group: update-snapshots-${{ github.event_name }}
  cancel-in-progress: false

jobs:
  update-snapshots:
    name: Update Storybook Snapshots
    runs-on: arc
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      issues: read
    # issue_comment fires on every comment edit across issues + PRs; only
    # proceed when the sticky Storybook preview comment had its accept
    # checkbox flipped from unchecked to checked.
    if: |
      github.event_name != 'issue_comment' || (
        github.event.issue.pull_request != null &&
        contains(github.event.comment.body, '<!-- nixmac-storybook-preview -->') &&
        contains(github.event.changes.body.from, '- [ ] Click here to accept these changes') &&
        contains(github.event.comment.body, '- [x] Click here to accept these changes')
      )
    steps:
      - name: Mint darkmatter[bot] token
        id: bot-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.DARKMATTER_APP_ID }}
          private-key: ${{ secrets.DARKMATTER_APP_PRIVATE_KEY }}

      - name: Resolve PR head ref
        id: ref
        if: github.event_name == 'issue_comment' || github.event.inputs.pr_number != ''
        env:
          GH_TOKEN: ${{ steps.bot-token.outputs.token }}
          PR_NUMBER: ${{ github.event.issue.number || github.event.inputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          pr_data=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}" --jq '{head: .head.ref, sha: .head.sha, base: .base.ref}')
          head_ref=$(echo "$pr_data" | jq -r '.head')
          head_sha=$(echo "$pr_data" | jq -r '.sha')
          echo "ref=${head_ref}" >> "$GITHUB_OUTPUT"
          echo "sha=${head_sha}" >> "$GITHUB_OUTPUT"
          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "Resolved PR #${PR_NUMBER} head: ${head_ref} (${head_sha})"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ steps.ref.outputs.ref || github.ref }}
          token: ${{ steps.bot-token.outputs.token }}

      - name: Setup Nix and caches
        uses: ./.github/actions/setup-nix
        with:
          darkmatter-cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Setup devenv profile
        uses: ./.github/actions/setup-devenv
        with:
          darkmatter-cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      # Fail fast if the nix-provided chromium can't launch on this runner
      # (unrealised store path, missing libs, fontless container). The script
      # also aliases nixpkgs browser revisions onto what playwright-core
      # expects before launching.
      - name: Check Playwright browser availability
        working-directory: apps/native
        run: DEBUG=pw:browser node scripts/check-playwright-browsers.ts

      - name: Update snapshots
        working-directory: apps/native
        run: bun run test:update-snapshots

      - name: Check for changes
        id: check
        run: |
          set -euo pipefail
          changed=$(git diff --name-only -- '__snapshots__' '**/__snapshots__/**')
          if [ -n "$changed" ]; then
            count=$(echo "$changed" | wc -l | tr -d ' ')
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "count=$count" >> "$GITHUB_OUTPUT"
            echo "### $count snapshot file(s) updated" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "$changed" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Snapshots are up to date — no changes." >> "$GITHUB_STEP_SUMMARY"
          fi

      # Accept-from-comment path: commit directly to the PR branch.
      - name: Commit snapshots to PR branch
        if: github.event_name == 'issue_comment' && steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ steps.bot-token.outputs.token }}
        run: |
          git config user.name "darkmatter[bot]"
          git config user.email "283346107+darkmatter[bot]@users.noreply.github.com"
          git add -- '__snapshots__' '**/__snapshots__/**'
          git commit -m "chore: accept Storybook snapshot changes (PR #${{ steps.ref.outputs.pr_number }})"
          git push origin HEAD:${{ steps.ref.outputs.ref }}

      - name: React to trigger comment
        if: github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ steps.bot-token.outputs.token }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          if [ "${{ steps.check.outputs.changed }}" = "true" ]; then
            gh api --method POST "repos/${REPO}/issues/comments/${COMMENT_ID}/reactions" \
              -f content='+1' >/dev/null
          else
            gh api --method POST "repos/${REPO}/issues/comments/${COMMENT_ID}/reactions" \
              -f content='-1' >/dev/null
          fi

      # Manual-dispatch path: open or update a PR against main.
      - name: Create pull request
        if: github.event_name != 'issue_comment' && steps.check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ steps.bot-token.outputs.token }}
          branch: chore/update-snapshots
          title: "chore: update Storybook snapshots"
          body: |
            Automated snapshot update from the `update-snapshots` workflow.

            Run `bun run test:update-snapshots` locally to preview the same changes.
          labels: snapshots
          commit-message: "chore: update Storybook snapshots"
          delete-branch: true
