name: E2E Tests

# ============================================================================
# Manual multi-scenario E2E test runner for nixmac
#
# Trigger method:
#   workflow_dispatch: Run any scenario on demand
#
# Scenario routing:
#   - nix-install → nix-install scenario (full install flow)
#   - all         → run all scenarios sequentially
#
# Future: AI-generated scenarios from PR diffs (Layer 4)
# ============================================================================

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: 'Scenario to run (or "all")'
        required: false
        default: "nix-install"
        type: choice
        options:
          - nix-install
          - all
      branch:
        description: "Branch to test (defaults to current)"
        required: false
        default: ""

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- Determine which scenarios to run ---
  resolve-scenarios:
    name: Resolve scenarios
    runs-on: [self-hosted, linux]
    outputs:
      scenarios: ${{ steps.resolve.outputs.scenarios }}
      branch: ${{ steps.ref.outputs.branch }}
      sha: ${{ steps.ref.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine branch and commit
        id: ref
        env:
          INPUT_BRANCH: ${{ inputs.branch || '' }}
          REF_NAME: ${{ github.ref_name }}
          TARGET_SHA: ${{ github.sha }}
        run: |
          if [ -n "$INPUT_BRANCH" ]; then
            echo "branch=$INPUT_BRANCH" >> "$GITHUB_OUTPUT"
          else
            echo "branch=$REF_NAME" >> "$GITHUB_OUTPUT"
          fi
          echo "sha=$TARGET_SHA" >> "$GITHUB_OUTPUT"

      - name: Resolve scenario list
        id: resolve
        env:
          INPUT_SCENARIO: ${{ inputs.scenario || 'nix-install' }}
        run: |
          if [ "$INPUT_SCENARIO" = "all" ]; then
            SCENARIOS=$(find tests/e2e/scenarios -maxdepth 1 -type f -name '*.sh' -exec basename {} .sh \; | jq -R . | jq -s .)
          else
            SCENARIOS=$(jq -cn --arg scenario "$INPUT_SCENARIO" '[$scenario]')
          fi

          echo "Resolved scenarios: $SCENARIOS"
          echo "scenarios=$SCENARIOS" >> "$GITHUB_OUTPUT"

  # --- Run each scenario ---
  e2e-test:
    name: "E2E: ${{ matrix.scenario }}"
    needs: resolve-scenarios
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 20
    # The MacInCloud host is a single shared mutable desktop. Serialize remote
    # E2E jobs across workflows; keep stale-run cancellation at workflow level.
    concurrency:
      group: nixmac-macincloud-e2e-remote
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        scenario: ${{ fromJSON(needs.resolve-scenarios.outputs.scenarios) }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup sops
        uses: nhedger/setup-sops@v2

      - name: Setup age
        uses: alessiodionisi/setup-age-action@v1.3.0

      - name: Load E2E secrets
        env:
          MAC_E2E_HOST_SECRET: ${{ secrets.MAC_E2E_HOST }}
          MAC_E2E_USER_SECRET: ${{ secrets.MAC_E2E_USER }}
          MAC_E2E_ADMIN_PW_SECRET: ${{ secrets.MAC_E2E_ADMIN_PASSWORD }}
          MAC_E2E_SSH_KEY_SECRET: ${{ secrets.MAC_E2E_SSH_KEY }}
          SOPS_AGE_KEY_DRKMTTR_DEV_SECRET: ${{ secrets.SOPS_AGE_KEY_DRKMTTR_DEV }}
          SOPS_AGE_KEY_SECRET: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          set -euo pipefail

          DIRECT_SECRET_COUNT=0
          for direct_secret in "$MAC_E2E_HOST_SECRET" "$MAC_E2E_USER_SECRET" "$MAC_E2E_ADMIN_PW_SECRET" "$MAC_E2E_SSH_KEY_SECRET"; do
            if [ -n "$direct_secret" ]; then
              DIRECT_SECRET_COUNT=$((DIRECT_SECRET_COUNT + 1))
            fi
          done

          if [ "$DIRECT_SECRET_COUNT" -eq 4 ]; then
            echo "Using direct MAC_E2E_* GitHub secrets."
            MAC_E2E_HOST="$MAC_E2E_HOST_SECRET"
            MAC_E2E_USER="$MAC_E2E_USER_SECRET"
            MAC_E2E_ADMIN_PW="$MAC_E2E_ADMIN_PW_SECRET"

            printf '%s\n' "$MAC_E2E_SSH_KEY_SECRET" > /tmp/e2e_ssh_key
          elif [ "$DIRECT_SECRET_COUNT" -gt 0 ]; then
            echo "::error::Partial MAC_E2E_* secret configuration. Set all four direct secrets or remove them and use SOPS fallback."
            exit 1
          else
            SECRETS_FILE="ops/secrets/e2e.enc.yaml"
            SOPS_AGE_KEY="${SOPS_AGE_KEY_DRKMTTR_DEV_SECRET:-$SOPS_AGE_KEY_SECRET}"
            export SOPS_AGE_KEY

            if [ -z "$SOPS_AGE_KEY" ]; then
              echo "::error::No E2E secret source configured. Set MAC_E2E_HOST, MAC_E2E_USER, MAC_E2E_ADMIN_PASSWORD, and MAC_E2E_SSH_KEY; or set SOPS_AGE_KEY_DRKMTTR_DEV/SOPS_AGE_KEY for $SECRETS_FILE."
              exit 1
            fi
            if [ ! -f "$SECRETS_FILE" ]; then
              echo "::error::SOPS secrets file not found at $SECRETS_FILE"
              exit 1
            fi

            echo "Using SOPS-encrypted E2E secrets."
            MAC_E2E_HOST=$(sops -d --extract '["mac_host"]' "$SECRETS_FILE")
            MAC_E2E_USER=$(sops -d --extract '["mac_user"]' "$SECRETS_FILE")
            MAC_E2E_ADMIN_PW=$(sops -d --extract '["mac_admin_pw"]' "$SECRETS_FILE")

            sops -d --extract '["mac_ssh_key"]' "$SECRETS_FILE" > /tmp/e2e_ssh_key
          fi

          echo "::add-mask::$MAC_E2E_HOST"
          echo "::add-mask::$MAC_E2E_USER"
          echo "::add-mask::$MAC_E2E_ADMIN_PW"
          while IFS= read -r key_line || [ -n "$key_line" ]; do
            if [ -n "$key_line" ]; then
              echo "::add-mask::$key_line"
            fi
          done < /tmp/e2e_ssh_key

          {
            echo "MAC_E2E_HOST=$MAC_E2E_HOST"
            echo "MAC_E2E_USER=$MAC_E2E_USER"
            echo "MAC_E2E_ADMIN_PW=$MAC_E2E_ADMIN_PW"
          } >> "$GITHUB_ENV"

          chmod 600 /tmp/e2e_ssh_key

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          cp /tmp/e2e_ssh_key ~/.ssh/e2e_key
          chmod 600 ~/.ssh/e2e_key

          # Validate the key was written correctly
          if ! ssh-keygen -l -f ~/.ssh/e2e_key >/dev/null 2>&1; then
            echo "::error::SSH key appears invalid. Check the configured E2E secret source."
            wc -l ~/.ssh/e2e_key
            exit 1
          fi

          ssh-keyscan -H "$MAC_E2E_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: "Run E2E: ${{ matrix.scenario }}"
        env:
          SCENARIO: ${{ matrix.scenario }}
          BRANCH: ${{ needs.resolve-scenarios.outputs.branch }}
          COMMIT_SHA: ${{ needs.resolve-scenarios.outputs.sha }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Write env vars to a script that gets piped to bash on the remote
          {
            echo "export ADMIN_PASSWORD=$(printf '%q' "$MAC_E2E_ADMIN_PW")"
            echo "export GH_TOKEN=$(printf '%q' "$GH_TOKEN")"
            echo "export BRANCH=$(printf '%q' "$BRANCH")"
            echo "export COMMIT_SHA=$(printf '%q' "$COMMIT_SHA")"
            echo "export SCENARIO=$(printf '%q' "$SCENARIO")"
            echo "export PATH=/opt/homebrew/bin:\$PATH"
            cat tests/e2e/ci-runner.sh
          } | ssh -o StrictHostKeyChecking=no \
                  -o ConnectTimeout=30 \
                  -o ServerAliveInterval=15 \
                  -o ServerAliveCountMax=4 \
                  -i ~/.ssh/e2e_key \
                  "${MAC_E2E_USER}@${MAC_E2E_HOST}" \
                  "bash -s"

      - name: Fetch test artifacts
        if: always()
        run: |
          SCP="scp -o StrictHostKeyChecking=no -i ~/.ssh/e2e_key"
          HOST="${MAC_E2E_USER}@${MAC_E2E_HOST}"
          mkdir -p artifacts

          $SCP "$HOST:/tmp/e2e-recording.mp4" artifacts/ 2>/dev/null || true
          $SCP "$HOST:/tmp/e2e-test.log" artifacts/ 2>/dev/null || true
          $SCP "$HOST:/tmp/e2e-test-results.json" artifacts/ 2>/dev/null || true
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/e2e_key "$HOST" \
            'ls /tmp/e2e-screenshots/*.png 2>/dev/null' | while read -r f; do
            $SCP "$HOST:$f" artifacts/ 2>/dev/null || true
          done

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "e2e-${{ matrix.scenario }}"
          path: artifacts/
          retention-days: 14

      - name: Post summary
        if: always()
        env:
          SCENARIO: ${{ matrix.scenario }}
        run: |
          exec >> "$GITHUB_STEP_SUMMARY"
          echo "### E2E: ${SCENARIO}"
          echo ""

          # JSON results (preferred)
          if [ -f artifacts/e2e-test-results.json ]; then
            PASSED=$(jq -r '.passed' artifacts/e2e-test-results.json)
            FAILED=$(jq -r '.failed' artifacts/e2e-test-results.json)
            DURATION=$(jq -r '.duration_seconds' artifacts/e2e-test-results.json)

            echo "| Phase | Status | Name |"
            echo "|-------|--------|------|"
            jq -r '.phases[] | "| \(.phase) | \(if .status == "PASS" then "✅" else "❌" end) | \(.message) |"' \
              artifacts/e2e-test-results.json
            echo ""
            echo "**Result:** $PASSED passed, $FAILED failed in ${DURATION}s"

          # Fallback: parse log
          elif [ -f artifacts/e2e-test.log ]; then
            grep -E '\[PASS\]|\[FAIL\]' artifacts/e2e-test.log | \
              sed 's/\x1b\[[0-9;]*m//g' | \
              while read -r line; do
                if echo "$line" | grep -q "PASS"; then
                  echo "✅ ${line#*PASS] }"
                else
                  echo "❌ ${line#*FAIL] }"
                fi
              done
          else
            echo "⚠️ No test results found."
          fi

          echo ""
          echo "📹 Video and screenshots in workflow artifacts."

      - name: Cleanup
        if: always()
        run: rm -f /tmp/e2e_ssh_key ~/.ssh/e2e_key
