name: nixmac E2E Gate

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize, labeled, unlabeled]
  workflow_dispatch:
    inputs:
      scenario:
        description: "Scenario to run, all, or pr when pr_number is set"
        required: false
        default: "auto_evolve_basic_package"
        type: string
      pr_number:
        description: "Optional PR number to update with the E2E sticky comment"
        required: false
        default: ""
        type: string
      pr_side_effects:
        description: "For manual dispatch: auto updates PR comment/check/status when pr_number is set; skip only writes summaries/artifacts"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - skip

concurrency:
  group: nixmac-e2e-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}

permissions:
  actions: read
  checks: write
  contents: read
  issues: write
  pull-requests: write
  statuses: write

jobs:
  resolve:
    name: Resolve E2E Scenarios
    runs-on: ubuntu-latest
    outputs:
      mac_required: ${{ steps.resolve.outputs.mac_required }}
      base_sha: ${{ steps.resolve.outputs.base_sha }}
      head_ref: ${{ steps.resolve.outputs.head_ref }}
      head_sha: ${{ steps.resolve.outputs.head_sha }}
      pr_number: ${{ steps.resolve.outputs.pr_number }}
      pr_side_effects_enabled: ${{ steps.resolve.outputs.pr_side_effects_enabled }}
      reason: ${{ steps.resolve.outputs.reason }}
      report_prefix: ${{ steps.resolve.outputs.report_prefix }}
      required: ${{ steps.resolve.outputs.required }}
      scenarios_mac: ${{ steps.resolve.outputs.scenarios_mac }}
      scenarios: ${{ steps.resolve.outputs.scenarios }}
      tauri_required: ${{ steps.resolve.outputs.tauri_required }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve scenarios
        id: resolve
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require("node:fs");
            const path = require("node:path");
            const { execFileSync } = require("node:child_process");
            const eventName = context.eventName;
            const payload = context.payload;
            let prForSelection = payload.pull_request || null;
            const dispatchScenario = String(payload.inputs?.scenario || "auto_evolve_basic_package").trim();
            const dispatchPrNumber = Number(payload.inputs?.pr_number || 0);
            const wantsPrResolution = eventName === "workflow_dispatch"
              && dispatchPrNumber > 0
              && ["pr", "auto", "pull_request", "pull-request"].includes(dispatchScenario);
            if (wantsPrResolution) {
              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: dispatchPrNumber,
              });
              prForSelection = pr;
            }

            const resolvedPrNumber = prForSelection?.number ?? (dispatchPrNumber > 0 ? dispatchPrNumber : null);
            const resolvedHeadSha = prForSelection?.head?.sha ?? context.sha;
            const resolvedBaseSha = prForSelection?.base?.sha ?? "";
            const resolvedHeadRef = prForSelection?.head?.ref ?? context.ref.replace(/^refs\/heads\//, "");
            const sameRepoPr = prForSelection
              && prForSelection.head?.repo?.full_name === prForSelection.base?.repo?.full_name
              && prForSelection.head?.repo?.full_name === `${context.repo.owner}/${context.repo.repo}`;
            if (sameRepoPr && resolvedHeadSha && resolvedHeadSha !== context.sha) {
              core.info(`Checking out PR head ${resolvedHeadSha} before resolving E2E scenarios`);
              execFileSync("git", ["fetch", "--no-tags", "--depth=1", "origin", resolvedHeadSha], { stdio: "inherit" });
              execFileSync("git", ["checkout", "--detach", resolvedHeadSha], { stdio: "inherit" });
            }

            const manifest = JSON.parse(
              fs.readFileSync("apps/native/e2e-tauri/scenarios/manifest.json", "utf8")
            );
            for (const scenario of manifest.scenarios || []) {
              for (const field of ["title", "summary"]) {
                if (typeof scenario[field] !== "string" || scenario[field].trim().length === 0) {
                  throw new Error(`E2E scenario ${scenario.name || "(unnamed)"} is missing ${field}`);
                }
              }
              for (const field of ["coverage", "riskAreas", "knownGaps"]) {
                if (!Array.isArray(scenario[field]) || scenario[field].length === 0) {
                  throw new Error(`E2E scenario ${scenario.name || "(unnamed)"} is missing ${field}`);
                }
              }
              for (const pattern of scenario.changePatterns || []) {
                new RegExp(pattern);
              }
            }
            const tauriScenarios = manifest.scenarios.filter((scenario) => scenario.lane === "tauri-wdio");
            const fullMacScenarios = manifest.scenarios.filter((scenario) => scenario.lane === "full-mac");
            const defaultTauriScenarios = tauriScenarios
              .filter((scenario) => scenario.requiredForDefaultPrPack)
              .map((scenario) => scenario.name);
            const scenarioByName = new Map(manifest.scenarios.map((scenario) => [scenario.name, scenario]));
            const nativePatterns = [
              /^apps\/native\/src\//,
              /^apps\/native\/src-tauri\//,
              /^apps\/native\/e2e/,
              /^tests\/e2e\//,
              /^apps\/native\/templates\//,
              /^apps\/native\/package\.json$/,
              /^apps\/native\/vite\.config\.ts$/,
              /^\.github\/workflows\//,
              /^bun\.lock$/,
              /^Cargo\.lock$/,
              /^package\.json$/,
            ];

            let required = false;
            let macRequired = false;
            let tauriRequired = false;
            let reason = "not required: no runtime/native paths changed";
            let scenarios = [];
            let macScenarios = [];
            let changed = [];
            let labels = [];
            const selectionReasons = new Map();
            const matchedFilesByScenario = new Map();

            function addSelection(name, why, files = []) {
              const scenario = scenarioByName.get(name);
              if (!scenario) return;
              if (!selectionReasons.has(name)) selectionReasons.set(name, new Set());
              selectionReasons.get(name).add(why);
              if (!matchedFilesByScenario.has(name)) matchedFilesByScenario.set(name, new Set());
              for (const file of files) matchedFilesByScenario.get(name).add(file);
            }

            function matchingFilesFor(scenario, files) {
              const patterns = (scenario.changePatterns || [])
                .map((pattern) => {
                  try {
                    return new RegExp(pattern);
                  } catch (error) {
                    core.warning(`Invalid E2E change pattern for ${scenario.name}: ${pattern}`);
                    return null;
                  }
                })
                .filter(Boolean);
              if (!patterns.length) return [];
              return files.filter((file) => patterns.some((pattern) => pattern.test(file)));
            }

            function scenarioDigest(scenario) {
              return {
                name: scenario.name,
                lane: scenario.lane,
                title: scenario.title || scenario.name,
                summary: scenario.summary || "",
                coverage: scenario.coverage || [],
                knownGaps: scenario.knownGaps || [],
                riskAreas: scenario.riskAreas || [],
                currentScript: scenario.currentScript || null,
                requiredForDefaultPrPack: Boolean(scenario.requiredForDefaultPrPack),
                selectionReasons: [...(selectionReasons.get(scenario.name) || [])],
                matchedFiles: [...(matchedFilesByScenario.get(scenario.name) || [])].slice(0, 12),
                matchedFileCount: matchedFilesByScenario.get(scenario.name)?.size || 0,
              };
            }

            function selectedNamesFor(lane) {
              return manifest.scenarios
                .filter((scenario) => scenario.lane === lane && selectionReasons.has(scenario.name))
                .map((scenario) => scenario.name);
            }

            function e2eLabelsOnly(allLabels) {
              return allLabels.filter((label) => label === "e2e:all" || label === "e2e:skip" || label === "e2e:mac" || label === "e2e:release-smoke" || label.startsWith("e2e:scenario:"));
            }

            function writeSelection(selection) {
              fs.mkdirSync("e2e-selection", { recursive: true });
              fs.writeFileSync(
                path.join("e2e-selection", "e2e-selection.json"),
                `${JSON.stringify(selection, null, 2)}\n`
              );
            }

            async function resolvePullRequest(pr) {
              labels = (pr.labels || []).map((label) => label.name);
              const headRepo = pr.head?.repo?.full_name;
              const baseRepo = pr.base?.repo?.full_name;

              if (headRepo && baseRepo && headRepo !== baseRepo) {
                required = false;
                reason = "not required: fork PRs cannot use trusted self-hosted E2E in this workflow";
              } else if (labels.includes("e2e:skip")) {
                required = false;
                reason = "not required: e2e:skip label present";
              } else {
                const files = await github.paginate(github.rest.pulls.listFiles, {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  per_page: 100,
                });
                changed = files.map((file) => file.filename);
                const touchedNative = changed.some((file) =>
                  nativePatterns.some((pattern) => pattern.test(file))
                );
                const requestedAll = labels.includes("e2e:all");
                const requestedMac = labels.includes("e2e:mac");
                const requestedReleaseSmoke = labels.includes("e2e:release-smoke");
                const requestedScenarioLabels = manifest.scenarios
                  .map((scenario) => [`e2e:scenario:${scenario.name}`, scenario])
                  .filter(([label]) => labels.includes(label));
                const impactedScenarios = manifest.scenarios
                  .map((scenario) => ({ scenario, files: matchingFilesFor(scenario, changed) }))
                  .filter((entry) => entry.files.length > 0);

                if (requestedAll) {
                  for (const scenario of manifest.scenarios) {
                    addSelection(scenario.name, "e2e:all label");
                  }
                  for (const { scenario, files } of impactedScenarios) {
                    addSelection(scenario.name, scenario.lane === "full-mac" ? "matched full-Mac change pattern" : "matched PR change pattern", files);
                  }
                  reason = "required: e2e:all label present";
                } else {
                  for (const [, scenario] of requestedScenarioLabels) {
                    addSelection(scenario.name, `scenario label e2e:scenario:${scenario.name}`);
                  }
                  if (requestedMac) {
                    for (const scenario of fullMacScenarios) {
                      addSelection(scenario.name, "e2e:mac label");
                    }
                  }
                  if (requestedReleaseSmoke) {
                    addSelection("release_dmg_app_translocation_smoke", "e2e:release-smoke label");
                  }
                  if (touchedNative) {
                    for (const name of defaultTauriScenarios) {
                      addSelection(name, "standard hosted PR pack for native/runtime changes");
                    }
                  }
                  for (const { scenario, files } of impactedScenarios) {
                    if (scenario.lane === "full-mac") {
                      addSelection(scenario.name, "adversarial full-Mac focus: matched PR files", files);
                    } else {
                      addSelection(scenario.name, "adversarial focus: matched PR files", files);
                    }
                  }

                  const requestedLabelNames = requestedScenarioLabels.map(([label]) => label);
                  const hasFullMacSelection = [...selectionReasons.keys()].some((name) => scenarioByName.get(name)?.lane === "full-mac");
                  if (touchedNative && requestedScenarioLabels.length > 0) {
                    reason = `required: runtime/native paths changed; scenario label present (${requestedLabelNames.join(", ")})`;
                  } else if (requestedScenarioLabels.length > 0) {
                    reason = `required: scenario label present (${requestedLabelNames.join(", ")})`;
                  } else if (touchedNative && requestedMac) {
                    reason = "required: runtime/native paths changed; full-Mac E2E label present (e2e:mac)";
                  } else if (requestedMac) {
                    reason = "required: full-Mac E2E label present (e2e:mac)";
                  } else if (touchedNative && requestedReleaseSmoke) {
                    reason = "required: runtime/native paths changed; full-Mac E2E label present (e2e:release-smoke)";
                  } else if (requestedReleaseSmoke) {
                    reason = "required: full-Mac E2E label present (e2e:release-smoke)";
                  } else if (hasFullMacSelection) {
                    reason = touchedNative
                      ? "required: runtime/native paths changed; adversarial full-Mac focus matched PR files"
                      : "required: adversarial full-Mac focus matched PR files";
                  } else if (touchedNative) {
                    reason = "required: runtime/native paths changed";
                  }
                }
              }
            }

            if (eventName === "workflow_dispatch") {
              required = true;
              if (wantsPrResolution) {
                await resolvePullRequest(prForSelection);
              } else if (["all", "e2e:all", "*"].includes(dispatchScenario)) {
                reason = "manual dispatch: all scenarios";
                for (const scenario of manifest.scenarios) {
                  addSelection(scenario.name, "manual dispatch: all scenarios");
                }
              } else {
                reason = `manual dispatch: ${dispatchScenario}`;
                const selected = scenarioByName.get(dispatchScenario);
                if (!selected) {
                  throw new Error(`Unknown E2E scenario for manual dispatch: ${dispatchScenario}`);
                }
                addSelection(dispatchScenario, "manual dispatch");
              }
            } else {
              await resolvePullRequest(prForSelection);
            }

            scenarios = selectedNamesFor("tauri-wdio");
            macScenarios = selectedNamesFor("full-mac");
            tauriRequired = scenarios.length > 0;
            macRequired = macScenarios.length > 0;
            required = required || tauriRequired || macRequired;

            const selectedScenarioDigests = manifest.scenarios
              .filter((scenario) => selectionReasons.has(scenario.name))
              .map(scenarioDigest);
            const attention = manifest.scenarios
              .filter((scenario) => (matchedFilesByScenario.get(scenario.name)?.size || 0) > 0)
              .map(scenarioDigest);
            const standardPackRan = defaultTauriScenarios.length > 0
              && defaultTauriScenarios.every((name) =>
                selectionReasons.get(name)?.has("standard hosted PR pack for native/runtime changes")
              );
            const hasE2eLabels = e2eLabelsOnly(labels).length > 0;
            const selectionMode = !required
              ? "not-required"
              : labels.includes("e2e:all")
                ? "all-label"
                : standardPackRan && hasE2eLabels
                  ? "pr-default-plus-label"
                  : e2eLabelsOnly(labels).some((label) => label.startsWith("e2e:scenario:"))
                    ? "scenario-label"
                    : labels.includes("e2e:mac") || labels.includes("e2e:release-smoke")
                      ? "full-mac-label"
                      : eventName === "workflow_dispatch" && !prForSelection
                        ? "manual"
                        : "pr-default";
            const prSideEffectsInput = String(payload.inputs?.pr_side_effects || "auto").trim().toLowerCase();
            const canMutatePr = !prForSelection || sameRepoPr;
            const prSideEffectsEnabled = (eventName === "pull_request" && canMutatePr)
              || (eventName === "workflow_dispatch" && Boolean(resolvedPrNumber) && prSideEffectsInput !== "skip" && canMutatePr);
            const validationMode = eventName === "workflow_dispatch"
              ? resolvedPrNumber
                ? prSideEffectsEnabled
                  ? "workflow_dispatch_pr"
                  : "workflow_dispatch_pr_preview"
                : "workflow_dispatch_manual"
              : "pull_request";
            const reportPrefix = resolvedPrNumber && prSideEffectsEnabled
              ? `e2e/pr-${resolvedPrNumber}/${resolvedHeadSha}`
              : resolvedPrNumber
                ? `e2e/pr-preview/pr-${resolvedPrNumber}/${context.runId}/${resolvedHeadSha}`
                : `e2e/manual/${context.runId}/${resolvedHeadSha}`;
            writeSelection({
              schemaVersion: 1,
              repo: context.repo.owner + "/" + context.repo.repo,
              prNumber: resolvedPrNumber,
              headSha: resolvedHeadSha,
              baseSha: resolvedBaseSha || null,
              headRef: resolvedHeadRef,
              eventName,
              validationMode,
              prSideEffects: prSideEffectsEnabled ? "enabled" : "skipped",
              reportPrefix,
              required,
              tauriRequired,
              macRequired,
              reason,
              selectionMode,
              triggerLabels: e2eLabelsOnly(labels),
              configured: {
                total: manifest.scenarios.length,
                tauri: tauriScenarios.length,
                fullMac: fullMacScenarios.length,
                defaultTauri: defaultTauriScenarios.length,
              },
              selected: selectedScenarioDigests,
              attention,
              standardPackRan,
              adversarialFocusCount: attention.length,
              changedFileCount: changed.length,
              changedFileSample: changed.slice(0, 12),
              note: "Scripted product-surface E2E pack runs first; PR-matched risk areas are called out as adversarial focus. Coverage is broad, not exhaustive.",
            });

            core.setOutput("required", required ? "true" : "false");
            core.setOutput("mac_required", macRequired ? "true" : "false");
            core.setOutput("base_sha", resolvedBaseSha || "");
            core.setOutput("head_ref", resolvedHeadRef || "");
            core.setOutput("head_sha", resolvedHeadSha);
            core.setOutput("pr_number", resolvedPrNumber ? String(resolvedPrNumber) : "");
            core.setOutput("pr_side_effects_enabled", prSideEffectsEnabled ? "true" : "false");
            core.setOutput("reason", reason);
            core.setOutput("report_prefix", reportPrefix);
            core.setOutput("scenarios", JSON.stringify(scenarios));
            core.setOutput("scenarios_mac", JSON.stringify(macScenarios));
            core.setOutput("tauri_required", tauriRequired ? "true" : "false");

      - name: Upload E2E selection
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-selection
          path: e2e-selection/e2e-selection.json
          retention-days: 14

  e2e:
    name: E2E / tauri-wdio / ${{ matrix.scenario }}
    needs: resolve
    if: needs.resolve.outputs.tauri_required == 'true'
    runs-on: macos-latest
    timeout-minutes: 45
    env:
      E2E_BASE_SHA: ${{ needs.resolve.outputs.base_sha }}
      E2E_HEAD_SHA: ${{ needs.resolve.outputs.head_sha }}
      GITHUB_PR_NUMBER: ${{ needs.resolve.outputs.pr_number }}
      NIXMAC_E2E_MOCK_SYSTEM: "1"
      NIXMAC_E2E_DOM_PROOF_CAPTURE: "1"
      NIXMAC_E2E_FRAME_TIMELINE: "1"
      NIXMAC_E2E_WEBVIEW_VIDEO: "0"
      NIXMAC_E2E_OPENROUTER_API_KEY: ${{ secrets.NIXMAC_E2E_OPENROUTER_API_KEY }}
      NIXMAC_E2E_REQUIRE_DEDICATED_OPENROUTER_KEY: "1"
      NIXMAC_E2E_OPENROUTER_MODEL: ${{ vars.NIXMAC_E2E_OPENROUTER_MODEL || 'anthropic/claude-sonnet-4' }}
      NIXMAC_E2E_OPENROUTER_SUMMARY_MODEL: ${{ vars.NIXMAC_E2E_OPENROUTER_SUMMARY_MODEL || 'openai/gpt-4o-mini' }}
      NIXMAC_E2E_OPENROUTER_MIN_LIMIT_REMAINING: ${{ vars.NIXMAC_E2E_OPENROUTER_MIN_LIMIT_REMAINING || '1' }}
    strategy:
      fail-fast: false
      matrix:
        scenario: ${{ fromJSON(needs.resolve.outputs.scenarios) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve.outputs.head_sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup sops
        uses: nhedger/setup-sops@v2
        with:
          version: 3.12.2

      - name: Setup age
        uses: alessiodionisi/setup-age-action@v1.3.0
        with:
          version: 1.3.1

      - name: Preflight live OpenRouter provider
        if: matrix.scenario == 'live_openrouter_evolve_smoke'
        shell: "sops exec-env ops/secrets/secrets.yaml \"bash -e {0}\""
        run: |
          cd apps/native
          node e2e-tauri/scripts/preflight-openrouter.mjs

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/native/src-tauri

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Build inside the scenario job. The debug Tauri binary is not reliably
      # portable between GitHub macOS runners, and a downloaded binary can
      # produce "no window" session failures before any product assertions run.
      - name: Build WDIO app
        working-directory: apps/native
        run: bun run test:wdio:build

      - name: Install tauri-wd
        run: cargo install tauri-webdriver-automation

      - name: Install video encoder
        run: |
          if ! command -v ffmpeg; then
            HOMEBREW_NO_AUTO_UPDATE=1 brew install ffmpeg
          fi

      - name: Verify runner prerequisites
        run: |
          command -v tauri-wd
          command -v ffmpeg
          command -v jq

      - name: Verify WDIO app build
        run: |
          chmod +x target/debug/nixmac
          test -f apps/native/dist/index.html
          test -x target/debug/nixmac

      - name: Clean stale WDIO services
        run: |
          rm -rf apps/native/e2e-tauri/artifacts
          pkill -f '[t]auri-wd' 2>/dev/null || true
          pkill -f '[t]arget/debug/nixmac' 2>/dev/null || true
          for port in 4444 5174; do
            pids=$(lsof -ti "tcp:${port}" 2>/dev/null || true)
            if [ -n "$pids" ]; then
              while IFS= read -r pid; do
                [ -n "$pid" ] && kill "$pid" 2>/dev/null || true
              done <<< "$pids"
              sleep 1
              while IFS= read -r pid; do
                [ -n "$pid" ] && kill -9 "$pid" 2>/dev/null || true
              done <<< "$pids"
            fi
          done

      - name: Start WDIO services
        working-directory: apps/native
        run: |
          bun run test:wdio:services > /tmp/nixmac-wdio-services.log 2>&1 &
          echo $! > /tmp/nixmac-wdio-services.pid
          for attempt in {1..30}; do
            if nc -z 127.0.0.1 4444 && nc -z 127.0.0.1 5174; then
              exit 0
            fi
            echo "Waiting for WDIO services (${attempt}/30)..."
            sleep 1
          done
          cat /tmp/nixmac-wdio-services.log || true
          exit 1

      - name: Run scenario
        id: run-scenario
        shell: "sops exec-env ops/secrets/secrets.yaml \"bash -e {0}\""
        run: |
          cd apps/native
          SCRIPT=$(jq -r --arg scenario "${{ matrix.scenario }}" '.scenarios[] | select(.name == $scenario and .lane == "tauri-wdio") | .currentScript // empty' e2e-tauri/scenarios/manifest.json)
          if [ -z "$SCRIPT" ]; then
            echo "Unknown or unrunnable Tauri WDIO scenario: ${{ matrix.scenario }}" >&2
            exit 1
          fi
          if [ "${{ matrix.scenario }}" = "live_openrouter_evolve_smoke" ]; then
            if [ "${NIXMAC_E2E_REQUIRE_DEDICATED_OPENROUTER_KEY:-}" = "1" ] && [ -z "${NIXMAC_E2E_OPENROUTER_API_KEY:-}" ]; then
              node e2e-tauri/scripts/write-infra-failure.mjs \
                "${{ matrix.scenario }}" \
                "Live OpenRouter scenario did not run because dedicated GitHub secret NIXMAC_E2E_OPENROUTER_API_KEY is not configured"
              exit 1
            fi
            if [ -z "${NIXMAC_E2E_OPENROUTER_API_KEY:-${OPENROUTER_API_KEY:-}}" ]; then
              node e2e-tauri/scripts/write-infra-failure.mjs \
                "${{ matrix.scenario }}" \
                "Live OpenRouter scenario did not run because NIXMAC_E2E_OPENROUTER_API_KEY or OPENROUTER_API_KEY is not configured"
              exit 1
            fi
          fi
          LOG_TMP="$(mktemp -t nixmac-wdio-${{ matrix.scenario }}.XXXXXX.log)"
          LOG_PATH="e2e-tauri/artifacts/${{ matrix.scenario }}/wdio.log"
          mkdir -p "e2e-tauri/artifacts/${{ matrix.scenario }}"
          set +e
          bun run "$SCRIPT" 2>&1 | tee "$LOG_TMP"
          status=${PIPESTATUS[0]}
          set -e
          mkdir -p "e2e-tauri/artifacts/${{ matrix.scenario }}"
          cp "$LOG_TMP" "$LOG_PATH" || true
          if [ "$status" -ne 0 ]; then
            node e2e-tauri/scripts/write-infra-failure.mjs "${{ matrix.scenario }}" "WDIO scenario command failed before a passing report was produced" "$LOG_PATH"
          fi
          rm -f "$LOG_TMP"
          exit "$status"

      - name: Write pre-scenario infra report if setup failed
        if: failure() && steps.run-scenario.outcome == 'skipped'
        working-directory: apps/native
        run: |
          node e2e-tauri/scripts/write-infra-failure.mjs \
            "${{ matrix.scenario }}" \
            "WDIO scenario did not run because a setup/bootstrap step failed before scenario execution"

      - name: Render report
        if: always()
        working-directory: apps/native
        run: bun run test:wdio:report

      - name: Publish E2E report to R2
        id: publish
        if: always() && ((github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) || github.event_name == 'workflow_dispatch')
        shell: "sops exec-env ops/secrets/secrets.yaml \"bash -e {0}\""
        env:
          AWS_DEFAULT_REGION: auto
          REPORT_PREFIX: ${{ needs.resolve.outputs.report_prefix }}
          SCENARIO: ${{ matrix.scenario }}
        run: |
          export AWS_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID"
          export AWS_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY"

          if [ ! -d apps/native/e2e-tauri/artifacts ]; then
            echo "No E2E artifacts to publish" >&2
            exit 1
          fi

          REPORT_URL="https://releases.nixmac.com/${REPORT_PREFIX}/${SCENARIO}/index.html"
          PUBLIC_PREFIX="https://releases.nixmac.com/${REPORT_PREFIX}"
          export REPORT_URL PUBLIC_PREFIX

          node <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");
          const root = "apps/native/e2e-tauri/artifacts";
          const reportUrl = process.env.REPORT_URL;
          const publicPrefix = process.env.PUBLIC_PREFIX;
          const isPublicUrl = (value) => /^https?:\/\//.test(String(value || ""));
          const publicUrlFor = (value) => {
            if (!value) return null;
            return isPublicUrl(value) ? value : `${publicPrefix}/${value}`;
          };

          const stack = [root];
          while (stack.length) {
            const current = stack.pop();
            for (const entry of fs.readdirSync(current, { withFileTypes: true })) {
              const full = path.join(current, entry.name);
              if (entry.isDirectory()) {
                stack.push(full);
                continue;
              }
              if (entry.name !== "e2e-report.json") continue;

              const report = JSON.parse(fs.readFileSync(full, "utf8"));
              const addVisualAnalysisUrls = (visualAnalysis) => visualAnalysis
                ? {
                    ...visualAnalysis,
                    frames: (visualAnalysis.frames || []).map((frame) => ({
                      ...frame,
                      url: frame.path ? publicUrlFor(frame.path) : frame.url,
                      thumbnailUrl: frame.path ? publicUrlFor(frame.path) : frame.thumbnailUrl,
                    })),
                  }
                : visualAnalysis;
              const addUrl = (proof) => ({
                ...proof,
                url: proof.path ? publicUrlFor(proof.path) : proof.url,
                thumbnailUrl: proof.path ? publicUrlFor(proof.path) : proof.thumbnailUrl,
                visualAnalysis: addVisualAnalysisUrls(proof.visualAnalysis),
              });
              report.htmlReportUrl = reportUrl;
              report.proof = (report.proof || []).map(addUrl);
              report.phases = (report.phases || []).map((phase) => ({
                ...phase,
                proof: (phase.proof || []).map(addUrl),
              }));
              const failure = report.proof.find((proof) => proof.isFailureProof);
              const firstFailure = (report.phases || []).find((phase) => phase.status !== "passed");
              const failureVideo = firstFailure
                ? report.proof.find((proof) => proof.kind === "video" && proof.phase === firstFailure.name)
                  || report.proof.find((proof) => proof.kind === "video")
                : null;
              const primary = failure
                || report.proof.find((proof) => proof.isPrimary)
                || failureVideo
                || report.proof.find((proof) => proof.kind === "video")
                || report.proof[0];
              report.primaryProofUrl = primary?.url || null;
              report.failureProofUrl = failure?.url || null;
              report.failureScreenshotUrl = failure?.kind === "screenshot" ? failure.url : null;
              report.failureVideoUrl = publicUrlFor(report.failureVideoUrl)
                || failureVideo?.url
                || (failure?.kind === "video" ? failure.url : null);
              fs.writeFileSync(full, `${JSON.stringify(report, null, 2)}\n`);
            }
          }
          NODE

          aws s3 cp apps/native/e2e-tauri/artifacts "s3://nixmac-releases/${REPORT_PREFIX}" \
            --recursive \
            --endpoint-url "$R2_ENDPOINT" \
            --cache-control "max-age=2592000"

          echo "report-url=$REPORT_URL" >> "$GITHUB_OUTPUT"
          echo "Published report: $REPORT_URL"

      - name: Stop WDIO services
        if: always()
        run: |
          if [ -f /tmp/nixmac-wdio-services.pid ]; then
            service_pid="$(cat /tmp/nixmac-wdio-services.pid)"
            pkill -TERM -P "$service_pid" 2>/dev/null || true
            kill "$service_pid" 2>/dev/null || true
            sleep 2
            pkill -KILL -P "$service_pid" 2>/dev/null || true
            kill -9 "$service_pid" 2>/dev/null || true
          fi
          pkill -f '[t]auri-wd' 2>/dev/null || true
          pkill -f '[t]arget/debug/nixmac' 2>/dev/null || true
          for port in 4444 5174; do
            pids=$(lsof -ti "tcp:${port}" 2>/dev/null || true)
            if [ -n "$pids" ]; then
              while IFS= read -r pid; do
                [ -n "$pid" ] && kill "$pid" 2>/dev/null || true
              done <<< "$pids"
              sleep 1
              while IFS= read -r pid; do
                [ -n "$pid" ] && kill -9 "$pid" 2>/dev/null || true
              done <<< "$pids"
            fi
          done

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-${{ matrix.scenario }}
          path: apps/native/e2e-tauri/artifacts/
          retention-days: 14

      - name: Scenario summary
        if: always()
        working-directory: apps/native
        run: |
          REPORT="e2e-tauri/artifacts/${{ matrix.scenario }}/e2e-report.json"
          echo "### E2E / tauri-wdio / ${{ matrix.scenario }}" >> "$GITHUB_STEP_SUMMARY"
          REPORT_URL="${{ steps.publish.outputs.report-url }}"
          if [ -f "$REPORT" ]; then
            STATUS=$(jq -r '.status' "$REPORT")
            PROOF=$(jq -r '.primaryProofUrl // "none"' "$REPORT")
            echo "- Status: $STATUS" >> "$GITHUB_STEP_SUMMARY"
            echo "- Proof: $PROOF" >> "$GITHUB_STEP_SUMMARY"
            LIMITATIONS=$(jq -r '(.captureLimitations // []) | join(", ")' "$REPORT")
            if [ -n "$LIMITATIONS" ]; then
              echo "- Capture limitations: $LIMITATIONS" >> "$GITHUB_STEP_SUMMARY"
            fi
            if [ -n "$REPORT_URL" ]; then
              echo "- HTML report: $REPORT_URL" >> "$GITHUB_STEP_SUMMARY"
            fi
            jq -r '.phases[] | "- " + .status + ": " + .name' "$REPORT" >> "$GITHUB_STEP_SUMMARY"
            if [ "$STATUS" != "passed" ]; then
              exit 1
            fi
          else
            echo "- Status: infra_failed" >> "$GITHUB_STEP_SUMMARY"
            echo "- Missing e2e-report.json" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

  e2e-mac:
    name: E2E / full-mac / ${{ matrix.scenario }}
    needs: resolve
    if: needs.resolve.outputs.mac_required == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      actions: write
      contents: read
    env:
      E2E_BASE_SHA: ${{ needs.resolve.outputs.base_sha }}
      E2E_HEAD_SHA: ${{ needs.resolve.outputs.head_sha }}
      GITHUB_PR_NUMBER: ${{ needs.resolve.outputs.pr_number }}
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        scenario: ${{ fromJSON(needs.resolve.outputs.scenarios_mac) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve.outputs.head_sha }}

      - name: Setup sops
        uses: nhedger/setup-sops@v2
        with:
          version: 3.12.2

      - name: Setup age
        uses: alessiodionisi/setup-age-action@v1.3.0
        with:
          version: 1.3.1

      - name: Check full-Mac secrets
        env:
          ADMIN_PASSWORD: ${{ secrets.MAC_E2E_ADMIN_PASSWORD }}
          MAC_E2E_HOST: ${{ secrets.MAC_E2E_HOST }}
          MAC_E2E_SSH_KEY: ${{ secrets.MAC_E2E_SSH_KEY }}
          MAC_E2E_USER: ${{ secrets.MAC_E2E_USER }}
          SCENARIO: ${{ matrix.scenario }}
        run: |
          missing=()
          [ -n "$MAC_E2E_HOST" ] || missing+=("MAC_E2E_HOST")
          [ -n "$MAC_E2E_USER" ] || missing+=("MAC_E2E_USER")
          [ -n "$MAC_E2E_SSH_KEY" ] || missing+=("MAC_E2E_SSH_KEY")
          [ -n "$ADMIN_PASSWORD" ] || missing+=("MAC_E2E_ADMIN_PASSWORD")
          if [ "${#missing[@]}" -eq 0 ]; then
            exit 0
          fi

          mkdir -p "apps/native/e2e-tauri/artifacts/${SCENARIO}"
          MISSING=$(IFS=', '; echo "${missing[*]}")
          MISSING="$MISSING" node <<'NODE'
          const fs = require("node:fs");
          const scenario = process.env.SCENARIO;
          const now = new Date().toISOString();
          const error = `Missing full-Mac E2E GitHub secrets: ${process.env.MISSING}`;
          const report = {
            schemaVersion: 1,
            repo: process.env.GITHUB_REPOSITORY || "darkmatter/nixmac",
            prNumber: process.env.GITHUB_PR_NUMBER ? Number(process.env.GITHUB_PR_NUMBER) : null,
            headSha: process.env.E2E_HEAD_SHA || process.env.GITHUB_SHA || "unknown",
            baseSha: process.env.E2E_BASE_SHA || null,
            workflowRunId: process.env.GITHUB_RUN_ID || null,
            attempt: process.env.GITHUB_RUN_ATTEMPT ? Number(process.env.GITHUB_RUN_ATTEMPT) : null,
            lane: "full-mac",
            scenario,
            runnerId: process.env.RUNNER_NAME || "github-hosted",
            runnerKind: "full-mac",
            startedAt: now,
            finishedAt: now,
            durationMs: 0,
            status: "infra_failed",
            htmlReportUrl: null,
            primaryProofUrl: null,
            failureProofUrl: null,
            failureScreenshotUrl: null,
            failureVideoUrl: null,
            failureTimestampMs: null,
            replayCommand: `tests/e2e/run.sh ${scenario}`,
            localReproCommand: `tests/e2e/run.sh ${scenario}`,
            phases: [{
              name: "Full-Mac runner secret preflight",
              status: "infra_failed",
              startedAt: now,
              finishedAt: now,
              durationMs: 0,
              assertions: ["Required MAC_E2E_* secrets are configured"],
              proof: [],
              error,
            }],
            proof: [],
          };
          fs.writeFileSync(
            `apps/native/e2e-tauri/artifacts/${scenario}/e2e-report.json`,
            `${JSON.stringify(report, null, 2)}\n`,
          );
          NODE
          echo "$MISSING" >&2
          exit 1

      - name: Setup SSH key
        run: |
          if [ -z "${{ secrets.MAC_E2E_HOST }}" ] || [ -z "${{ secrets.MAC_E2E_USER }}" ] || [ -z "${{ secrets.MAC_E2E_SSH_KEY }}" ]; then
            echo "Missing MAC_E2E_HOST, MAC_E2E_USER, or MAC_E2E_SSH_KEY" >&2
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.MAC_E2E_SSH_KEY }}" > ~/.ssh/nixmac_e2e
          chmod 600 ~/.ssh/nixmac_e2e
          ssh-keyscan -H "${{ secrets.MAC_E2E_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Ensure Build macOS App artifact
        id: ensure-build
        continue-on-error: true
        env:
          BUILD_POLL_SECONDS: "30"
          BUILD_WAIT_SECONDS: "2700"
          GH_TOKEN: ${{ github.token }}
          HEAD_REF: ${{ needs.resolve.outputs.head_ref || github.head_ref || github.ref_name }}
          HEAD_SHA: ${{ needs.resolve.outputs.head_sha }}
          REPO: ${{ github.repository }}
        run: |
          set -uo pipefail
          : > /tmp/e2e-full-mac-preflight.log

          log() {
            echo "[ci] $*" | tee -a /tmp/e2e-full-mac-preflight.log
          }

          fail() {
            log "ERROR: $*"
            exit 1
          }

          find_build_run() {
            gh api "repos/${REPO}/actions/runs?head_sha=${HEAD_SHA}&per_page=50" \
              --jq '([.workflow_runs[] | select(.name == "Build macOS App")] | sort_by(.created_at) | reverse | .[0]) // empty | {id, status, conclusion: (.conclusion // ""), html_url}' \
              2>/dev/null || true
          }

          read_build_field() {
            printf '%s\n' "$run_info" | jq -r "$1"
          }

          log "Build macOS App preflight for exact commit ${HEAD_SHA}"
          if [ -z "$HEAD_SHA" ]; then
            fail "HEAD_SHA is empty; refusing to look up or dispatch an unpinned Build macOS App run"
          fi

          run_info="$(find_build_run)"
          if [ -n "$run_info" ]; then
            run_id="$(read_build_field '.id')"
            run_status="$(read_build_field '.status')"
            run_conclusion="$(read_build_field '.conclusion')"
            run_url="$(read_build_field '.html_url')"
            if [ "$run_status" = "completed" ] && [ "$run_conclusion" = "success" ]; then
              log "Found successful Build macOS App run for ${HEAD_SHA}: ${run_url}"
              echo "build_run_id=$run_id" >> "$GITHUB_OUTPUT"
              echo "build_run_url=$run_url" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            if [ "$run_status" = "completed" ]; then
              fail "Build macOS App completed without success for ${HEAD_SHA}: ${run_url}"
            fi
            log "Found pending Build macOS App run for ${HEAD_SHA}: id=${run_id} status=${run_status}"
          else
            if [ -z "$HEAD_REF" ]; then
              fail "Cannot dispatch Build macOS App because no PR head ref was resolved for ${HEAD_SHA}"
            fi

            branch_sha="$(gh api "repos/${REPO}/git/ref/heads/${HEAD_REF}" --jq '.object.sha' 2>/dev/null || true)"
            if [ -z "$branch_sha" ]; then
              fail "Cannot verify branch head for ${HEAD_REF}; refusing to dispatch an unpinned Build macOS App run"
            fi
            if [ "$branch_sha" != "$HEAD_SHA" ]; then
              fail "PR head moved before full-Mac build preflight; resolved ${HEAD_SHA}, branch ${HEAD_REF} is now ${branch_sha}"
            fi

            log "No Build macOS App run found for ${HEAD_SHA}; dispatching build.yaml on ${HEAD_REF}"
            if ! gh workflow run build.yaml --repo "$REPO" --ref "$HEAD_REF" >> /tmp/e2e-full-mac-preflight.log 2>&1; then
              fail "Failed to dispatch Build macOS App for ${HEAD_SHA}"
            fi
            post_dispatch_sha="$(gh api "repos/${REPO}/git/ref/heads/${HEAD_REF}" --jq '.object.sha' 2>/dev/null || true)"
            if [ "$post_dispatch_sha" != "$HEAD_SHA" ]; then
              fail "PR head moved after dispatching Build macOS App; resolved ${HEAD_SHA}, branch ${HEAD_REF} is now ${post_dispatch_sha:-unknown}"
            fi
          fi

          started="$(date +%s)"
          while true; do
            run_info="$(find_build_run)"
            if [ -n "$run_info" ]; then
              run_id="$(read_build_field '.id')"
              run_status="$(read_build_field '.status')"
              run_conclusion="$(read_build_field '.conclusion')"
              run_url="$(read_build_field '.html_url')"
              log "Build macOS App run for ${HEAD_SHA}: id=${run_id} status=${run_status} conclusion=${run_conclusion:-pending} url=${run_url}"
              if [ "$run_status" = "completed" ] && [ "$run_conclusion" = "success" ]; then
                echo "build_run_id=$run_id" >> "$GITHUB_OUTPUT"
                echo "build_run_url=$run_url" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              if [ "$run_status" = "completed" ]; then
                fail "Build macOS App completed without success for ${HEAD_SHA}: ${run_url}"
              fi
            else
              log "Waiting for dispatched Build macOS App run to appear for ${HEAD_SHA}"
            fi

            elapsed=$(( $(date +%s) - started ))
            if [ "$elapsed" -ge "$BUILD_WAIT_SECONDS" ]; then
              fail "Timed out waiting for successful Build macOS App run for exact commit ${HEAD_SHA}"
            fi
            sleep "$BUILD_POLL_SECONDS"
          done

      - name: Run full-Mac scenario over SSH
        id: ssh-run
        if: steps.ensure-build.outcome == 'success'
        continue-on-error: true
        env:
          ADMIN_PASSWORD: ${{ secrets.MAC_E2E_ADMIN_PASSWORD }}
          BRANCH_NAME: ${{ needs.resolve.outputs.head_ref || github.head_ref || github.ref_name }}
          COMMIT_SHA: ${{ needs.resolve.outputs.head_sha }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SCENARIO: ${{ matrix.scenario }}
        run: |
          set +e
          {
            echo "export ADMIN_PASSWORD=$(printf '%q' "$ADMIN_PASSWORD")"
            echo "export GH_TOKEN=$(printf '%q' "$GH_TOKEN")"
            echo "export BRANCH=$(printf '%q' "$BRANCH_NAME")"
            echo "export COMMIT_SHA=$(printf '%q' "$COMMIT_SHA")"
            echo "export E2E_HEAD_SHA=$(printf '%q' "$E2E_HEAD_SHA")"
            echo "export E2E_BASE_SHA=$(printf '%q' "$E2E_BASE_SHA")"
            echo "export SCENARIO=$(printf '%q' "$SCENARIO")"
            echo "export GITHUB_REPOSITORY=$(printf '%q' "${{ github.repository }}")"
            echo "export GITHUB_PR_NUMBER=$(printf '%q' "${GITHUB_PR_NUMBER:-null}")"
            echo "export GITHUB_RUN_ID=$(printf '%q' "${{ github.run_id }}")"
            echo "export GITHUB_RUN_ATTEMPT=$(printf '%q' "${{ github.run_attempt }}")"
            echo "export PATH=/opt/homebrew/bin:\$PATH"
            cat tests/e2e/ci-runner.sh
          } | timeout 40m ssh -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=4 \
            -i ~/.ssh/nixmac_e2e \
            "${{ secrets.MAC_E2E_USER }}@${{ secrets.MAC_E2E_HOST }}" \
            "bash -s" \
            > /tmp/e2e-full-mac-ssh.log 2>&1
          status=${PIPESTATUS[1]}
          set -e

          cat /tmp/e2e-full-mac-ssh.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Fetch full-Mac artifacts
        if: always()
        run: |
          ARTIFACT_DIR="apps/native/e2e-tauri/artifacts"
          mkdir -p "$ARTIFACT_DIR"
          SCP="scp -o StrictHostKeyChecking=no -o ConnectTimeout=20 -i ~/.ssh/nixmac_e2e"
          HOST="${{ secrets.MAC_E2E_USER }}@${{ secrets.MAC_E2E_HOST }}"
          $SCP -r "$HOST:/tmp/e2e-artifacts/." "$ARTIFACT_DIR/" 2>/dev/null || true
          $SCP "$HOST:/tmp/e2e-recording.mp4" "$ARTIFACT_DIR/" 2>/dev/null || true
          $SCP "$HOST:/tmp/e2e-ffmpeg.log" "$ARTIFACT_DIR/" 2>/dev/null || true
          $SCP "$HOST:/tmp/e2e-test.log" "$ARTIFACT_DIR/" 2>/dev/null || true
          $SCP "$HOST:/tmp/e2e-test-results.json" "$ARTIFACT_DIR/" 2>/dev/null || true
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=20 -i ~/.ssh/nixmac_e2e "$HOST" \
            'ls /tmp/e2e-screenshots/*.png 2>/dev/null' | while read -r file; do
              $SCP "$HOST:$file" "$ARTIFACT_DIR/" 2>/dev/null || true
            done

      - name: Write full-Mac infra report if missing
        if: always()
        env:
          COMMIT_SHA: ${{ needs.resolve.outputs.head_sha }}
          SCENARIO: ${{ matrix.scenario }}
          SSH_STATUS: ${{ steps.ssh-run.outputs.status || 'not-run' }}
        run: |
          REPORT="apps/native/e2e-tauri/artifacts/${SCENARIO}/e2e-report.json"
          if [ -s "$REPORT" ]; then
            echo "Full-Mac report already exists: $REPORT"
            exit 0
          fi

          mkdir -p "apps/native/e2e-tauri/artifacts/${SCENARIO}"
          node <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");
          const scenario = process.env.SCENARIO;
          const now = new Date().toISOString();
          const logPath = "/tmp/e2e-full-mac-ssh.log";
          const preflightLogPath = "/tmp/e2e-full-mac-preflight.log";
          const rawLog = fs.existsSync(logPath)
            ? fs.readFileSync(logPath, "utf8")
            : fs.existsSync(preflightLogPath)
              ? fs.readFileSync(preflightLogPath, "utf8")
              : "";
          const redactSecrets = (value) => String(value || "")
            .replace(/x-access-token:[^@\s]+@/g, "x-access-token:[redacted]@")
            .replace(/gh[pousr]_[A-Za-z0-9_]+/g, "[redacted-github-token]")
            .replace(/github_pat_[A-Za-z0-9_]+/g, "[redacted-github-token]")
            .replace(/Bearer\s+[A-Za-z0-9._-]+/gi, "Bearer [redacted]")
            .replace(/(ADMIN_PASSWORD=)[^\s]+/g, "$1[redacted]");
          const flattenForInline = (value) => redactSecrets(value)
            .replace(/[\r\n|]+/g, " ")
            .replace(/\s+/g, " ")
            .trim()
            .slice(0, 1600);
          const diagnosticLines = (value) => redactSecrets(value)
            .replace(/\r\n?/g, "\n")
            .replace(/\s+(\[[a-z]+\]\s+)/gi, "\n$1")
            .replace(/\s+(?=(?:ERROR|Error|error|fatal|Failed|failed|End-of-central-directory|unzip:|find:|bash:)\b)/g, "\n")
            .split("\n")
            .map((line) => line.replace(/\s+/g, " ").trim())
            .filter(Boolean);
          const isSignalLine = (line) => /(\bERROR\b|\berror\b|\bfatal\b|\bfailed\b|No \.app bundle|End-of-central-directory|cannot find zipfile|Terminated:|timed out|Missing full-Mac E2E GitHub secrets)/i.test(line);
          const summarizeError = (value) => {
            const lines = diagnosticLines(value);
            const signals = lines.filter(isSignalLine);
            const summaryLine = signals.at(-1) || lines.at(-1) || "";
            const summary = summaryLine
              .replace(/^\[[a-z]+\]\s+/i, "")
              .replace(/^(?:ERROR|Error|error):\s*/, "")
              .trim();
            return summary.length > 220 ? `${summary.slice(0, 217)}...` : summary;
          };
          const status = process.env.SSH_STATUS || "not-run";
          const redactedLog = redactSecrets(rawLog).trim();
          const buildPreflightFailed = /Build macOS App preflight/i.test(rawLog)
            && !fs.existsSync(logPath);
          const phaseName = buildPreflightFailed
            ? "Build macOS App preflight"
            : "Full-Mac SSH runner";
          const phaseAssertions = buildPreflightFailed
            ? ["Find or create a successful Build macOS App run for the exact tested commit"]
            : ["Reach the configured Mac runner over SSH and collect scenario artifacts"];
          const scenarioDir = path.join("apps/native/e2e-tauri/artifacts", scenario);
          fs.mkdirSync(scenarioDir, { recursive: true });
          const logRelPath = redactedLog ? `${scenario}/full-mac-ssh.log` : null;
          if (redactedLog) {
            fs.writeFileSync(path.join(scenarioDir, "full-mac-ssh.log"), `${redactedLog}\n`);
          }
          const error = summarizeError(rawLog)
            || flattenForInline(rawLog)
            || `Full-Mac runner did not produce e2e-report.json (SSH status: ${status})`;
          const logProof = logRelPath ? [{
            kind: "log",
            path: logRelPath,
            url: null,
            thumbnailUrl: null,
            timestampMs: null,
            phase: phaseName,
            caption: buildPreflightFailed ? "Build macOS App preflight log" : "Full-Mac SSH diagnostic log",
            isPrimary: true,
            isFailureProof: true,
          }] : [];
          const report = {
            schemaVersion: 1,
            repo: process.env.GITHUB_REPOSITORY || "darkmatter/nixmac",
            prNumber: process.env.GITHUB_PR_NUMBER ? Number(process.env.GITHUB_PR_NUMBER) : null,
            headSha: process.env.E2E_HEAD_SHA || process.env.COMMIT_SHA || process.env.GITHUB_SHA || "unknown",
            baseSha: process.env.E2E_BASE_SHA || null,
            workflowRunId: process.env.GITHUB_RUN_ID || null,
            attempt: process.env.GITHUB_RUN_ATTEMPT ? Number(process.env.GITHUB_RUN_ATTEMPT) : null,
            lane: "full-mac",
            scenario,
            runnerId: process.env.RUNNER_NAME || "github-hosted",
            runnerKind: "full-mac",
            startedAt: now,
            finishedAt: now,
            durationMs: 0,
            status: "infra_failed",
            htmlReportUrl: null,
            primaryProofUrl: null,
            failureProofUrl: null,
            failureScreenshotUrl: null,
            failureVideoUrl: null,
            failureTimestampMs: null,
            replayCommand: `tests/e2e/run.sh ${scenario}`,
            localReproCommand: `tests/e2e/run.sh ${scenario}`,
            captureLimitations: ["full_mac_runner_unavailable"],
            phases: [{
              name: phaseName,
              status: "infra_failed",
              startedAt: now,
              finishedAt: now,
              durationMs: 0,
              assertions: phaseAssertions,
              proof: logProof,
              error,
            }],
            proof: logProof,
          };
          fs.writeFileSync(
            path.join(scenarioDir, "e2e-report.json"),
            `${JSON.stringify(report, null, 2)}\n`,
          );
          NODE

      - name: Render full-Mac report
        if: always()
        run: node apps/native/e2e-tauri/scripts/render-report.mjs

      - name: Publish full-Mac report to R2
        id: publish
        if: always() && ((github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) || github.event_name == 'workflow_dispatch')
        shell: "sops exec-env ops/secrets/secrets.yaml \"bash -e {0}\""
        env:
          AWS_DEFAULT_REGION: auto
          REPORT_PREFIX: ${{ needs.resolve.outputs.report_prefix }}
          SCENARIO: ${{ matrix.scenario }}
        run: |
          export AWS_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID"
          export AWS_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY"

          if [ ! -d apps/native/e2e-tauri/artifacts ]; then
            echo "No full-Mac E2E artifacts to publish" >&2
            exit 1
          fi

          REPORT_URL="https://releases.nixmac.com/${REPORT_PREFIX}/${SCENARIO}/index.html"
          PUBLIC_PREFIX="https://releases.nixmac.com/${REPORT_PREFIX}"
          export REPORT_URL PUBLIC_PREFIX

          node <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");
          const root = "apps/native/e2e-tauri/artifacts";
          const reportUrl = process.env.REPORT_URL;
          const publicPrefix = process.env.PUBLIC_PREFIX;
          const isPublicUrl = (value) => /^https?:\/\//.test(String(value || ""));
          const publicUrlFor = (value) => {
            if (!value) return null;
            return isPublicUrl(value) ? value : `${publicPrefix}/${value}`;
          };

          const stack = [root];
          while (stack.length) {
            const current = stack.pop();
            for (const entry of fs.readdirSync(current, { withFileTypes: true })) {
              const full = path.join(current, entry.name);
              if (entry.isDirectory()) {
                stack.push(full);
                continue;
              }
              if (entry.name !== "e2e-report.json") continue;

              const report = JSON.parse(fs.readFileSync(full, "utf8"));
              const addVisualAnalysisUrls = (visualAnalysis) => visualAnalysis
                ? {
                    ...visualAnalysis,
                    frames: (visualAnalysis.frames || []).map((frame) => ({
                      ...frame,
                      url: frame.path ? publicUrlFor(frame.path) : frame.url,
                      thumbnailUrl: frame.path ? publicUrlFor(frame.path) : frame.thumbnailUrl,
                    })),
                  }
                : visualAnalysis;
              const addUrl = (proof) => ({
                ...proof,
                url: proof.path ? publicUrlFor(proof.path) : proof.url,
                thumbnailUrl: proof.path ? publicUrlFor(proof.path) : proof.thumbnailUrl,
                visualAnalysis: addVisualAnalysisUrls(proof.visualAnalysis),
              });
              report.htmlReportUrl = reportUrl;
              report.proof = (report.proof || []).map(addUrl);
              report.phases = (report.phases || []).map((phase) => ({
                ...phase,
                proof: (phase.proof || []).map(addUrl),
              }));
              const failure = report.proof.find((proof) => proof.isFailureProof);
              const firstFailure = (report.phases || []).find((phase) => phase.status !== "passed");
              const failureVideo = firstFailure
                ? report.proof.find((proof) => proof.kind === "video" && proof.phase === firstFailure.name)
                  || report.proof.find((proof) => proof.kind === "video")
                : null;
              const primary = failure
                || report.proof.find((proof) => proof.isPrimary)
                || failureVideo
                || report.proof.find((proof) => proof.kind === "video")
                || report.proof[0];
              report.primaryProofUrl = primary?.url || null;
              report.failureProofUrl = failure?.url || null;
              report.failureScreenshotUrl = failure?.kind === "screenshot" ? failure.url : null;
              report.failureVideoUrl = publicUrlFor(report.failureVideoUrl)
                || failureVideo?.url
                || (failure?.kind === "video" ? failure.url : null);
              fs.writeFileSync(full, `${JSON.stringify(report, null, 2)}\n`);
            }
          }
          NODE

          aws s3 cp apps/native/e2e-tauri/artifacts "s3://nixmac-releases/${REPORT_PREFIX}" \
            --recursive \
            --endpoint-url "$R2_ENDPOINT" \
            --cache-control "max-age=2592000"

          echo "report-url=$REPORT_URL" >> "$GITHUB_OUTPUT"
          echo "Published full-Mac report: $REPORT_URL"

      - name: Full-Mac scenario summary
        if: always()
        run: |
          REPORT="apps/native/e2e-tauri/artifacts/${{ matrix.scenario }}/e2e-report.json"
          echo "### E2E / full-Mac / ${{ matrix.scenario }}" >> "$GITHUB_STEP_SUMMARY"
          REPORT_URL="${{ steps.publish.outputs.report-url }}"
          if [ -f "$REPORT" ]; then
            STATUS=$(jq -r '.status' "$REPORT")
            PROOF=$(jq -r '.primaryProofUrl // "none"' "$REPORT")
            echo "- Status: $STATUS" >> "$GITHUB_STEP_SUMMARY"
            echo "- Proof: $PROOF" >> "$GITHUB_STEP_SUMMARY"
            LIMITATIONS=$(jq -r '(.captureLimitations // []) | join(", ")' "$REPORT")
            if [ -n "$LIMITATIONS" ]; then
              echo "- Capture limitations: $LIMITATIONS" >> "$GITHUB_STEP_SUMMARY"
            fi
            if [ -n "$REPORT_URL" ]; then
              echo "- HTML report: $REPORT_URL" >> "$GITHUB_STEP_SUMMARY"
            fi
            jq -r '.phases[] | "- " + .status + ": " + .name' "$REPORT" >> "$GITHUB_STEP_SUMMARY"
            if [ "$STATUS" != "passed" ]; then
              exit 1
            fi
          else
            echo "- Status: infra_failed" >> "$GITHUB_STEP_SUMMARY"
            echo "- Missing e2e-report.json" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Upload full-Mac artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-mac-${{ matrix.scenario }}
          path: apps/native/e2e-tauri/artifacts/
          retention-days: 14

  gate:
    name: nixmac E2E Gate
    needs: [resolve, e2e, e2e-mac]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve.outputs.head_sha }}

      - name: Setup sops
        uses: nhedger/setup-sops@v2
        with:
          version: 3.12.2

      - name: Setup age
        uses: alessiodionisi/setup-age-action@v1.3.0
        with:
          version: 1.3.1

      - name: Download E2E artifacts
        if: always()
        uses: actions/download-artifact@v7
        with:
          pattern: e2e-*
          path: e2e-artifacts

      - name: Render aggregate proof gallery
        if: always() && needs.resolve.outputs.required == 'true'
        env:
          NIXMAC_E2E_SKIP_VISUAL_ANALYSIS: "1"
        run: |
          rm -rf apps/native/e2e-tauri/artifacts
          mkdir -p apps/native/e2e-tauri/artifacts

          report_count=0
          while IFS= read -r -d '' report; do
            scenario="$(jq -r '.scenario // empty' "$report")"
            if [ -z "$scenario" ]; then
              scenario="$(basename "$(dirname "$report")")"
            fi
            dest="apps/native/e2e-tauri/artifacts/$scenario"
            rm -rf "$dest"
            mkdir -p "$dest"
            cp -R "$(dirname "$report")"/. "$dest"/
            report_count=$((report_count + 1))
          done < <(find e2e-artifacts -path '*/e2e-report.json' -print0)

          selection_file="$(find e2e-artifacts -name e2e-selection.json -print -quit)"
          if [ -n "$selection_file" ]; then
            cp "$selection_file" apps/native/e2e-tauri/artifacts/e2e-selection.json
          fi

          if [ "$report_count" -eq 0 ]; then
            echo "No scenario reports found for aggregate proof gallery" >&2
            exit 1
          fi

          node apps/native/e2e-tauri/scripts/render-report.mjs
          echo "Rendered aggregate proof gallery for $report_count scenario reports"

      - name: Build AI QA evidence packet
        if: always() && needs.resolve.outputs.required == 'true'
        shell: "sops exec-env ops/secrets/secrets.yaml \"bash -e {0}\""
        env:
          NIXMAC_E2E_AI_QA_API_KEY: ${{ secrets.NIXMAC_E2E_AI_QA_API_KEY || secrets.OPENAI_API_KEY }}
          NIXMAC_E2E_AI_QA_MODEL: ${{ vars.NIXMAC_E2E_AI_QA_MODEL || 'gpt-5.1' }}
          NIXMAC_E2E_AI_QA_REQUIRED: ${{ vars.NIXMAC_E2E_AI_QA_REQUIRED || 'false' }}
        run: |
          node apps/native/e2e-tauri/scripts/build-ai-qa-packet.mjs
          if [ -f apps/native/e2e-tauri/artifacts/ai-qa/ai-qa-report.md ]; then
            cat apps/native/e2e-tauri/artifacts/ai-qa/ai-qa-report.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Publish aggregate proof gallery to R2
        id: publish-aggregate
        if: always() && needs.resolve.outputs.required == 'true' && ((github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) || github.event_name == 'workflow_dispatch')
        shell: "sops exec-env ops/secrets/secrets.yaml \"bash -e {0}\""
        env:
          AWS_DEFAULT_REGION: auto
          REPORT_PREFIX: ${{ needs.resolve.outputs.report_prefix }}
        run: |
          export AWS_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID"
          export AWS_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY"

          if [ ! -f apps/native/e2e-tauri/artifacts/index.html ]; then
            echo "Aggregate proof gallery was not rendered" >&2
            exit 1
          fi

          aws s3 cp apps/native/e2e-tauri/artifacts "s3://nixmac-releases/${REPORT_PREFIX}" \
            --recursive \
            --endpoint-url "$R2_ENDPOINT" \
            --cache-control "max-age=2592000"

          echo "report-url=https://releases.nixmac.com/${REPORT_PREFIX}/index.html" >> "$GITHUB_OUTPUT"
          echo "Published aggregate proof gallery: https://releases.nixmac.com/${REPORT_PREFIX}/index.html"

      - name: Resolve gate result
        id: result
        uses: actions/github-script@v8
        with:
          script: |
            const required = "${{ needs.resolve.outputs.required }}" === "true";
            const tauriRequired = "${{ needs.resolve.outputs.tauri_required }}" === "true";
            const macRequired = "${{ needs.resolve.outputs.mac_required }}" === "true";
            const reason = `${{ needs.resolve.outputs.reason }}`;
            const e2eResult = "${{ needs.e2e.result }}";
            const macResult = "${{ needs.e2e-mac.result }}";
            let status = "not required";
            let conclusion = "success";

            if (required) {
              const tauriOk = tauriRequired ? e2eResult === "success" : e2eResult === "skipped";
              const macOk = macRequired ? macResult === "success" : macResult === "skipped";
              if (!tauriRequired && !macRequired) {
                status = "infra failed";
                conclusion = "failure";
              } else if (tauriOk && macOk) {
                status = "passed";
              } else if (e2eResult === "cancelled" || macResult === "cancelled") {
                status = "cancelled";
                conclusion = "failure";
              } else {
                status = "failed";
                conclusion = "failure";
              }
            }

            core.setOutput("status", status);
            core.setOutput("conclusion", conclusion);
            core.setOutput("reason", reason);

      - name: E2E gate summary and PR publication
        if: always()
        uses: actions/github-script@v8
        env:
          E2E_STATUS: ${{ steps.result.outputs.status }}
          E2E_CONCLUSION: ${{ steps.result.outputs.conclusion }}
          E2E_REASON: ${{ steps.result.outputs.reason }}
          E2E_REQUIRED: ${{ needs.resolve.outputs.required }}
          E2E_PR_NUMBER: ${{ needs.resolve.outputs.pr_number }}
          E2E_PR_SIDE_EFFECTS_ENABLED: ${{ needs.resolve.outputs.pr_side_effects_enabled }}
          E2E_HEAD_SHA: ${{ needs.resolve.outputs.head_sha }}
          E2E_ARTIFACT_ROOT: e2e-artifacts
        with:
          script: |
            const publishE2ePrSummary = require("./apps/native/e2e-tauri/scripts/publish-e2e-pr-summary.cjs");
            await publishE2ePrSummary({ github, context, core });

      - name: Fail gate if needed
        if: steps.result.outputs.conclusion != 'success'
        run: |
          echo "nixmac E2E Gate ${{ steps.result.outputs.status }}: ${{ steps.result.outputs.reason }}" >&2
          exit 1
