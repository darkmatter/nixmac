name: Build macOS App
on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]
  workflow_dispatch:
env:
  CARGO_TERM_COLOR: always
  SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/native/src-tauri
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Setup sops
        uses: nhedger/setup-sops@v2
      - name: Setup age
        uses: alessiodionisi/setup-age-action@v1.3.0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install frontend dependencies
        run: bun install --frozen-lockfile
      # Check if code signing secrets are available
      - name: Check for code signing secrets
        id: check-secrets
        shell: 'sops exec-env .secrets.enc.yaml "bash -e {0}"'
        run: |
          if [ -n "$APPLE_CERTIFICATE" ]; then
            echo "has_certificate=true" >> $GITHUB_OUTPUT
          else
            echo "has_certificate=false" >> $GITHUB_OUTPUT
          fi
          if [ -n "$APPLE_API_KEY_CONTENT" ]; then
            echo "has_notarization=true" >> $GITHUB_OUTPUT
          else
            echo "has_notarization=false" >> $GITHUB_OUTPUT
          fi
      # Import Apple Developer certificate (only for releases with secrets)
      - name: Import Apple Developer certificate
        if: startsWith(github.ref, 'refs/tags/') && steps.check-secrets.outputs.has_certificate == 'true'
        shell: 'sops exec-env .secrets.enc.yaml "bash -e {0}"'
        # env:
        #   APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
        #   APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        #   KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create a temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import the certificate
          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Debug: List available signing identities
          echo "=== Available signing identities ==="
          security find-identity -v -p codesigning $KEYCHAIN_PATH
          echo "=== End identities ==="
      # Build the Tauri app (TAURI_SIGNING_PRIVATE_KEY + PASSWORD come from sops)
      - name: Build Tauri app
        run: bun run desktop:build
        shell: 'sops exec-env .secrets.enc.yaml "bash -e {0}"'
      # Sign the app bundle (required for notarization)
      - name: Sign app bundle
        if: startsWith(github.ref, 'refs/tags/') && steps.check-secrets.outputs.has_certificate == 'true'
        run: |
          APP_PATH=$(find target/release/bundle/macos -name "*.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            echo "Signing $APP_PATH..."
            
            # Get the signing identity from the keychain
            KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
            IDENTITY=$(security find-identity -v -p codesigning $KEYCHAIN_PATH | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)".*/\1/')
            
            if [ -z "$IDENTITY" ]; then
              echo "ERROR: No Developer ID Application identity found in keychain"
              security find-identity -v -p codesigning $KEYCHAIN_PATH
              exit 1
            fi
            
            echo "Using identity: $IDENTITY"
            
            # Sign with hardened runtime (required for notarization)
            codesign --force --deep --options runtime \
              --entitlements apps/native/src-tauri/entitlements.plist \
              --sign "$IDENTITY" \
              "$APP_PATH"
            
            echo "Verifying signature..."
            codesign --verify --verbose "$APP_PATH"
          else
            echo "No .app found to sign"
            exit 1
          fi
      # Rebuild DMG with signed app
      - name: Rebuild DMG with signed app
        if: startsWith(github.ref, 'refs/tags/') && steps.check-secrets.outputs.has_certificate == 'true'
        run: |
          APP_PATH=$(find target/release/bundle/macos -name "*.app" -type d | head -1)
          DMG_PATH=$(find target/release/bundle/dmg -name "*.dmg" -type f | head -1)

          if [ -n "$APP_PATH" ] && [ -n "$DMG_PATH" ]; then
            echo "Recreating DMG with signed app..."
            DMG_NAME=$(basename "$DMG_PATH")
            
            # Remove old DMG
            rm -f "$DMG_PATH"
            
            # Create new DMG
            hdiutil create -volname "nixmac" -srcfolder "$APP_PATH" -ov -format UDZO "$DMG_PATH"
            
            echo "New DMG created: $DMG_PATH"
          fi
      # Notarize the app (requires Apple Developer account)
      - name: Notarize app
        if: startsWith(github.ref, 'refs/tags/') && steps.check-secrets.outputs.has_notarization == 'true'
        shell: 'sops exec-env .secrets.enc.yaml "bash -e {0}"'
        run: |
          # Write the API key to a file
          echo "$APPLE_API_KEY_CONTENT" > $RUNNER_TEMP/AuthKey.p8

          DMG_PATH=$(find target/release/bundle/dmg -name "*.dmg" -type f | head -1)

          if [ -n "$DMG_PATH" ]; then
            echo "Notarizing $DMG_PATH..."
            xcrun notarytool submit "$DMG_PATH" \
              --key "$RUNNER_TEMP/AuthKey.p8" \
              --key-id "$APPLE_API_KEY_ID" \
              --issuer "$APPLE_API_ISSUER" \
              --wait

            # Staple the notarization ticket
            xcrun stapler staple "$DMG_PATH"
          fi

          # Clean up the key file
          rm -f $RUNNER_TEMP/AuthKey.p8
      - name: Get artifact paths
        id: artifacts
        run: |
          DMG_PATH=$(find target/release/bundle/dmg -name "*.dmg" -type f 2>/dev/null | head -1 || echo "")
          APP_PATH=$(find target/release/bundle/macos -name "*.app" -type d 2>/dev/null | head -1 || echo "")

          echo "dmg_path=$DMG_PATH" >> $GITHUB_OUTPUT
          echo "app_path=$APP_PATH" >> $GITHUB_OUTPUT

          if [ -n "$DMG_PATH" ]; then
            echo "dmg_name=$(basename "$DMG_PATH")" >> $GITHUB_OUTPUT
          fi
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: nixmac-macos-dmg
          path: target/release/bundle/dmg/*.dmg
          if-no-files-found: warn
      - name: Upload app bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: nixmac-macos-app
          path: target/release/bundle/macos/*.app
          if-no-files-found: warn
      # Create GitHub Release for tags
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            target/release/bundle/dmg/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Upload to R2 for auto-updater (R2 creds come from sops)
      - name: Upload to R2
        if: startsWith(github.ref, 'refs/tags/')
        shell: 'sops exec-env .secrets.enc.yaml "bash -e {0}"'
        env:
          AWS_DEFAULT_REGION: auto
        run: |
          # Map SOPS env vars to AWS CLI vars
          export AWS_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID"
          export AWS_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY"

          VERSION="${GITHUB_REF_NAME#v}"

          # Find the .app.tar.gz and .sig files from Tauri build output
          TAR_GZ=$(find target/release/bundle -name "*.app.tar.gz" -not -name "*.sig" | head -1)
          SIG_FILE=$(find target/release/bundle -name "*.app.tar.gz.sig" | head -1)

          if [ -z "$TAR_GZ" ] || [ -z "$SIG_FILE" ]; then
            echo "ERROR: Could not find .app.tar.gz or .sig file"
            echo "Contents of target/release/bundle:"
            find target/release/bundle -type f -name "*.tar.gz*" 2>/dev/null || true
            exit 1
          fi

          echo "Found tar.gz: $TAR_GZ"
          echo "Found sig: $SIG_FILE"

          SIGNATURE=$(cat "$SIG_FILE")

          # Upload binary artifacts with long cache
          aws s3 cp "$TAR_GZ" "s3://nixmac-releases/${VERSION}/nixmac.app.tar.gz" \
            --endpoint-url "$R2_ENDPOINT" \
            --cache-control "max-age=31536000"

          aws s3 cp "$SIG_FILE" "s3://nixmac-releases/${VERSION}/nixmac.app.tar.gz.sig" \
            --endpoint-url "$R2_ENDPOINT" \
            --cache-control "max-age=31536000"

          # Generate latest.json
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Try to get release notes from the GitHub release
          NOTES=""
          if command -v gh &> /dev/null; then
            NOTES=$(gh release view "$GITHUB_REF_NAME" --json body -q .body 2>/dev/null || echo "")
          fi

          cat > /tmp/latest.json << EOF
          {
            "version": "${VERSION}",
            "notes": $(echo "$NOTES" | jq -Rs .),
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${SIGNATURE}",
                "url": "https://releases.nixmac.com/${VERSION}/nixmac.app.tar.gz"
              }
            }
          }
          EOF

          # Pretty-print to validate JSON
          cat /tmp/latest.json | jq . > /tmp/latest-formatted.json

          # Upload latest.json with short cache
          aws s3 cp /tmp/latest-formatted.json "s3://nixmac-releases/latest.json" \
            --endpoint-url "$R2_ENDPOINT" \
            --cache-control "max-age=300" \
            --content-type "application/json"

          echo "✅ Uploaded to R2: v${VERSION}"
      - name: Cleanup keychain
        if: always()
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain $KEYCHAIN_PATH || true
          fi
