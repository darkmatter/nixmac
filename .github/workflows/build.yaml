name: Build macOS App
on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]
  workflow_dispatch:
env:
  CARGO_TERM_COLOR: always
  SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/native/src-tauri
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Setup sops
        uses: nhedger/setup-sops@v2
      - name: Setup age
        uses: alessiodionisi/setup-age-action@v1.3.0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install frontend dependencies
        run: bun install --frozen-lockfile
      # Sync native app version files to the tag version (on tag builds) or the
      # max(package.json, latest-git-tag) version (on branch/PR builds). Using the
      # max protects against a stale package.json causing branch builds to embed a
      # lower version than what has already shipped, which would produce a
      # false-positive update banner (e.g. embedding 0.5.0 when latest.json is 0.16.2).
      - name: Sync native app version
        id: sync-version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            echo "Tag build — syncing to tag version: $VERSION"
          else
            PKG_VERSION=$(node -p "require('./package.json').version")
            # Guard against stale package.json: if the latest git tag is newer,
            # use the tag version so branch builds never embed a lower version than
            # what has already shipped (which would trigger a false-positive update banner).
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || echo "")
            # Portable semver compare via Node (avoids sort -V which requires GNU coreutils).
            # Exits 0 (true) when LATEST_TAG > PKG_VERSION, 1 otherwise.
            _tag_is_newer() {
              node -e "
                const a = '$PKG_VERSION'.split('.').map(s => parseInt(s, 10));
                const b = '$LATEST_TAG'.split('.').map(s => parseInt(s, 10));
                for (let i = 0; i < 3; i++) {
                  if ((b[i]||0) > (a[i]||0)) process.exit(0);
                  if ((a[i]||0) > (b[i]||0)) process.exit(1);
                }
                process.exit(1);
              "
            }
            if [[ -n "$LATEST_TAG" ]] && _tag_is_newer; then
              echo "⚠️  package.json version ($PKG_VERSION) lags behind latest tag ($LATEST_TAG) — using tag version to prevent false-positive update banner"
              VERSION="$LATEST_TAG"
            else
              VERSION="$PKG_VERSION"
            fi
            echo "Branch/PR build — syncing to version: $VERSION"
          fi
          node scripts/sync-versions.mjs "$VERSION"
          SHORT_SHA=${GITHUB_SHA::8}
          BUILD_VERSION="${VERSION}-${SHORT_SHA}"

          echo "VERSION=$BUILD_VERSION" >> "$GITHUB_ENV"
          echo "build_version=$BUILD_VERSION" >> "$GITHUB_OUTPUT"
      - name: Check for code signing secrets
        id: check-secrets
        shell: 'sops exec-env .secrets.enc.yaml "bash -e {0}"'
        run: |
          if [ -n "$APPLE_CERTIFICATE" ]; then
            echo "has_certificate=true" >> $GITHUB_OUTPUT
          else
            echo "has_certificate=false" >> $GITHUB_OUTPUT
          fi
          if [ -n "$APPLE_API_KEY_CONTENT" ]; then
            echo "has_notarization=true" >> $GITHUB_OUTPUT
          else
            echo "has_notarization=false" >> $GITHUB_OUTPUT
          fi
      # Build the Tauri app (TAURI_SIGNING_PRIVATE_KEY + PASSWORD come from sops)
      # NOTE: Certificate import is intentionally deferred until after this step.
      # Running `security list-keychain -d user -s <keychain>` before the build
      # replaces the keychain search list and breaks DMG bundling on tag runs.
      - name: Build Tauri app
        run: bun run desktop:build
        shell: 'sops exec-env .secrets.enc.yaml "bash -e {0}"'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Pass DSNs and build metadata into the tauri action step so build.rs can read them
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          NIXMAC_ENV: prod
          NIXMAC_VERSION: ${{ steps.sync-version.outputs.build_version }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_NIXMAC_ENV: prod
          VITE_NIXMAC_VERSION: ${{ steps.sync-version.outputs.build_version }}
      # Import Apple Developer certificate (only for releases with secrets).
      # Placed AFTER the Tauri build to avoid replacing the keychain search list
      # before `bun run desktop:build`, which caused DMG bundling failures on tags.
      - name: Import Apple Developer certificate
        if: startsWith(github.ref, 'refs/tags/') && steps.check-secrets.outputs.has_certificate == 'true'
        shell: 'sops exec-env .secrets.enc.yaml "bash -e {0}"'
        run: |
          # Create a temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import the certificate
          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          # Prepend our keychain but keep the existing search list so later steps
          # that do not need the cert still have access to the default keychains.
          security list-keychain -d user -s $KEYCHAIN_PATH $(security list-keychains -d user | tr -d '"' | xargs)

          # Debug: List available signing identities
          echo "=== Available signing identities ==="
          security find-identity -v -p codesigning $KEYCHAIN_PATH
          echo "=== End identities ==="
      # Sign the app bundle (required for notarization)
      - name: Sign app bundle
        if: startsWith(github.ref, 'refs/tags/') && steps.check-secrets.outputs.has_certificate == 'true'
        run: |
          APP_PATH=$(find target/release/bundle/macos -name "*.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            echo "Signing $APP_PATH..."
            
            # Get the signing identity from the keychain
            KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
            IDENTITY=$(security find-identity -v -p codesigning $KEYCHAIN_PATH | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)".*/\1/')
            
            if [ -z "$IDENTITY" ]; then
              echo "ERROR: No Developer ID Application identity found in keychain"
              security find-identity -v -p codesigning $KEYCHAIN_PATH
              exit 1
            fi
            
            echo "Using identity: $IDENTITY"
            
            # Sign with hardened runtime (required for notarization)
            codesign --force --deep --options runtime \
              --entitlements apps/native/src-tauri/entitlements.plist \
              --sign "$IDENTITY" \
              "$APP_PATH"
            
            echo "Verifying signature..."
            codesign --verify --verbose "$APP_PATH"
          else
            echo "No .app found to sign"
            exit 1
          fi
      # Replace unsigned app inside the Tauri-built DMG with the signed one.
      # We mount the DMG read-write, swap the .app in place, and re-compress so
      # the Finder window layout (background image, /Applications alias, icon
      # positions) defined in tauri.conf.json's bundle.macOS.dmg is preserved.
      # Previously this step deleted the DMG and called `hdiutil create`, which
      # shipped a bare DMG without the drag-to-Applications affordance.
      - name: Swap signed app into Tauri DMG
        if: startsWith(github.ref, 'refs/tags/') && steps.check-secrets.outputs.has_certificate == 'true'
        run: |
          APP_PATH=$(find target/release/bundle/macos -name "*.app" -type d | head -1)
          DMG_PATH=$(find target/release/bundle/dmg -name "*.dmg" -type f | head -1)

          if [ -z "$APP_PATH" ] || [ -z "$DMG_PATH" ]; then
            echo "ERROR: missing APP_PATH or DMG_PATH (APP_PATH=$APP_PATH DMG_PATH=$DMG_PATH)"
            exit 1
          fi

          APP_NAME=$(basename "$APP_PATH")
          RW_DMG="${DMG_PATH%.dmg}.rw.dmg"
          MOUNT_POINT="$RUNNER_TEMP/dmg-mount"
          mkdir -p "$MOUNT_POINT"

          # Detach with retries. Writes may still be flushing after rsync, and
          # CI runners occasionally hold file handles briefly after process
          # exit. Match Tauri's generated create-dmg helper pattern instead of
          # using -force unconditionally.
          detach_with_retry() {
            local mount="$1"
            for i in 1 2 3 4 5; do
              if hdiutil detach "$mount"; then
                return 0
              fi
              if [ "$i" -lt 5 ]; then
                echo "detach of $mount failed, retry $i/5 in 2s..."
                sleep 2
              fi
            done
            echo "WARNING: all 5 detach attempts failed for $mount, forcing..."
            hdiutil detach "$mount" -force
          }

          echo "Converting DMG to read-write so we can swap in the signed app..."
          hdiutil convert "$DMG_PATH" -format UDRW -o "$RW_DMG"

          # Grow the RW DMG to give the signed bundle headroom, but only if
          # needed. `hdiutil resize -size` is an exact target (not grow-only),
          # so a fixed cap could attempt to shrink larger images in the future.
          # Compute required size from the signed app's on-disk footprint plus
          # a 50 MB padding buffer, and only resize if the current image is
          # smaller than required.
          APP_SIZE_KB=$(du -sk "$APP_PATH" | awk '{print $1}')
          REQUIRED_KB=$((APP_SIZE_KB + 51200))
          CURRENT_KB=$(du -k "$RW_DMG" | awk '{print $1}')
          if [ "$REQUIRED_KB" -gt "$CURRENT_KB" ]; then
            echo "Growing RW DMG from ${CURRENT_KB}KB to ${REQUIRED_KB}KB (app ${APP_SIZE_KB}KB + 50MB headroom)..."
            hdiutil resize -size "${REQUIRED_KB}k" "$RW_DMG"
          else
            echo "RW DMG already has enough headroom (${CURRENT_KB}KB >= ${REQUIRED_KB}KB required), skipping resize."
          fi

          echo "Mounting RW DMG at $MOUNT_POINT..."
          hdiutil attach -readwrite -nobrowse -noautoopen -mountpoint "$MOUNT_POINT" "$RW_DMG"

          if [ ! -d "$MOUNT_POINT/$APP_NAME" ]; then
            echo "ERROR: expected $APP_NAME inside the DMG, found:"
            ls -la "$MOUNT_POINT"
            detach_with_retry "$MOUNT_POINT" || true
            exit 1
          fi

          echo "Replacing $APP_NAME inside the DMG with the signed bundle..."
          # --delete prunes stale files from the old unsigned bundle (e.g. the
          # previous _CodeSignature). The trailing slashes sync directory
          # *contents*, keeping the existing .DS_Store and /Applications alias
          # that define the DMG's Finder layout.
          rsync -a --delete "$APP_PATH/" "$MOUNT_POINT/$APP_NAME/"

          echo "Detaching RW DMG..."
          detach_with_retry "$MOUNT_POINT"

          echo "Re-compressing DMG back to UDZO at $DMG_PATH..."
          rm -f "$DMG_PATH"
          hdiutil convert "$RW_DMG" -format UDZO -imagekey zlib-level=9 -o "$DMG_PATH"
          rm -f "$RW_DMG"

          echo "Verifying signed app inside re-packed DMG..."
          hdiutil attach -readonly -nobrowse -noautoopen -mountpoint "$MOUNT_POINT" "$DMG_PATH"
          codesign --verify --verbose "$MOUNT_POINT/$APP_NAME"
          detach_with_retry "$MOUNT_POINT"

          echo "Done: $DMG_PATH now contains the signed app with the preserved Finder layout."
      # Notarize the app (requires Apple Developer account)
      - name: Notarize app
        if: startsWith(github.ref, 'refs/tags/') && steps.check-secrets.outputs.has_notarization == 'true'
        shell: 'sops exec-env .secrets.enc.yaml "bash -e {0}"'
        run: |
          # Write the API key to a file
          echo "$APPLE_API_KEY_CONTENT" > $RUNNER_TEMP/AuthKey.p8

          DMG_PATH=$(find target/release/bundle/dmg -name "*.dmg" -type f | head -1)

          if [ -n "$DMG_PATH" ]; then
            echo "Notarizing $DMG_PATH..."
            xcrun notarytool submit "$DMG_PATH" \
              --key "$RUNNER_TEMP/AuthKey.p8" \
              --key-id "$APPLE_API_KEY_ID" \
              --issuer "$APPLE_API_ISSUER" \
              --wait

            # Staple the notarization ticket
            xcrun stapler staple "$DMG_PATH"
          fi

          # Clean up the key file
          rm -f $RUNNER_TEMP/AuthKey.p8
      - name: Get artifact paths
        id: artifacts
        run: |
          DMG_PATH=$(find target/release/bundle/dmg -name "*.dmg" -type f 2>/dev/null | head -1 || echo "")
          APP_PATH=$(find target/release/bundle/macos -name "*.app" -type d 2>/dev/null | head -1 || echo "")

          echo "dmg_path=$DMG_PATH" >> $GITHUB_OUTPUT
          echo "app_path=$APP_PATH" >> $GITHUB_OUTPUT

          if [ -n "$DMG_PATH" ]; then
            echo "dmg_name=$(basename "$DMG_PATH")" >> $GITHUB_OUTPUT
          fi
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: nixmac-macos-dmg
          path: target/release/bundle/dmg/*.dmg
          if-no-files-found: warn
      - name: Upload app bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: nixmac-macos-app
          path: target/release/bundle/macos/*.app
          if-no-files-found: warn
      # Create GitHub Release for tags
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            target/release/bundle/dmg/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Upload to R2 for auto-updater (R2 creds come from sops)
      - name: Upload to R2
        if: startsWith(github.ref, 'refs/tags/')
        shell: 'sops exec-env .secrets.enc.yaml "bash -e {0}"'
        env:
          AWS_DEFAULT_REGION: auto
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Map SOPS env vars to AWS CLI vars
          export AWS_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID"
          export AWS_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY"

          VERSION="${GITHUB_REF_NAME#v}"

          # Find the .app.tar.gz and .sig files from Tauri build output
          TAR_GZ=$(find target/release/bundle -name "*.app.tar.gz" -not -name "*.sig" | head -1)
          SIG_FILE=$(find target/release/bundle -name "*.app.tar.gz.sig" | head -1)

          if [ -z "$TAR_GZ" ] || [ -z "$SIG_FILE" ]; then
            echo "ERROR: Could not find .app.tar.gz or .sig file"
            echo "Contents of target/release/bundle:"
            find target/release/bundle -type f -name "*.tar.gz*" 2>/dev/null || true
            exit 1
          fi

          echo "Found tar.gz: $TAR_GZ"
          echo "Found sig: $SIG_FILE"

          SIGNATURE=$(cat "$SIG_FILE" | jq -Rs .)

          # Upload binary artifacts with long cache
          aws s3 cp "$TAR_GZ" "s3://nixmac-releases/${VERSION}/nixmac.app.tar.gz" \
            --endpoint-url "$R2_ENDPOINT" \
            --cache-control "max-age=31536000"

          aws s3 cp "$SIG_FILE" "s3://nixmac-releases/${VERSION}/nixmac.app.tar.gz.sig" \
            --endpoint-url "$R2_ENDPOINT" \
            --cache-control "max-age=31536000"

          # Generate latest.json
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Try to get release notes from the GitHub release
          NOTES=""
          if command -v gh &> /dev/null; then
            NOTES=$(gh release view "$GITHUB_REF_NAME" --json body -q .body 2>/dev/null || echo "")
          fi

          cat > /tmp/latest.json << EOF
          {
            "version": "${VERSION}",
            "notes": $(echo "$NOTES" | jq -Rs .),
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": ${SIGNATURE},
                "url": "https://releases.nixmac.com/${VERSION}/nixmac.app.tar.gz"
              }
            }
          }
          EOF

          # Pretty-print to validate JSON
          cat /tmp/latest.json | jq . > /tmp/latest-formatted.json

          # Upload latest.json with short cache
          aws s3 cp /tmp/latest-formatted.json "s3://nixmac-releases/latest.json" \
            --endpoint-url "$R2_ENDPOINT" \
            --cache-control "max-age=300" \
            --content-type "application/json"

          echo "✅ Uploaded to R2: v${VERSION}"
      - name: Cleanup keychain
        if: always()
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain $KEYCHAIN_PATH || true
          fi
