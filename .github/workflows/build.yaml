name: Build macOS App
on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:

concurrency:
  group: build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
jobs:
  rust-tests:
    name: Rust Tests (Linux)
    runs-on: arc
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Linux Tauri dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/native/src-tauri

      - name: Patch passkey Swift package
        working-directory: apps/native/src-tauri
        run: |
          cargo fetch --locked
          bash "$GITHUB_WORKSPACE/ops/scripts/ci/patch-passkey-swift.sh"

      - name: Rust unit tests
        working-directory: apps/native
        run: cargo test --manifest-path src-tauri/Cargo.toml
        env:
          NIXMAC_ENV: production
  build:
    needs: rust-tests
    runs-on: [self-hosted, macOS]
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true
          clean: false

      - name: Clean workspace while preserving CI caches
        shell: bash
        run: |
          git reset --hard
          git clean -ffdx -e .devenv/ -e .devenv-ci/

      - name: Setup Nix and caches
        uses: ./.github/actions/setup-nix
        with:
          darkmatter-cachix-auth-token: ${{ secrets.DARKMATTER_CACHIX_AUTH_TOKEN }}

      - name: Setup devenv profile
        uses: ./.github/actions/setup-devenv
        with:
          darkmatter-cachix-auth-token: ${{ secrets.DARKMATTER_CACHIX_AUTH_TOKEN }}

      - name: Setup Xcode Swift toolchain
        uses: ./.github/actions/setup-xcode

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Install frontend dependencies
        run: bun install

      # tauri-plugin-macos-passkey 0.1.0 ships a Swift package declaring
      # swift-tools-version 6.1, but the self-hosted runner has Swift 6.0.2
      # (Xcode 16.1). Fetch crates and lower the declared tools version before
      # syncing the app version: sync-version mutates Cargo.toml, which would
      # make `cargo fetch --locked` fail because Cargo.lock still contains the
      # committed package version.
      - name: Patch passkey Swift package
        working-directory: apps/native/src-tauri
        run: |
          cargo fetch --locked
          bash "$GITHUB_WORKSPACE/ops/scripts/ci/patch-passkey-swift.sh"
      # Decide what kind of build this is:
      #   - tag:     push of refs/tags/v* → ship that exact version on stable
      #   - develop: push to main → ship on the develop channel
      #   - branch:  PR / feature branch / workflow_dispatch → build-only
      #
      # Tags are the source of truth for shipped (stable) versions. Pushes to
      # main land on the develop channel; the stable channel only updates when
      # a release is created in GitHub (which pushes a v* tag).
      - name: Compute release version
        id: release-version
        run: bash ops/scripts/release/compute-version.sh

      - name: Setup sccache
        shell: bash
        run: |
          if ! command -v sccache &>/dev/null; then
            brew install sccache 2>/dev/null || cargo install sccache 2>/dev/null || true
          fi
          echo "SCCACHE_DIR=$RUNNER_TEMP/sccache" >> "$GITHUB_ENV"
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
          mkdir -p "$RUNNER_TEMP/sccache"

      - name: Restore sccache
        uses: actions/cache/restore@v4
        with:
          path: ${{ runner.temp }}/sccache
          key: sccache-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            sccache-${{ runner.os }}-${{ runner.arch }}-
      # Sync native app version files. Tag + develop modes use the computed
      # version directly; branch/PR builds fall back to the max(package.json,
      # latest-git-tag) guard so a stale package.json cannot embed a version
      # lower than what has already shipped (which would trigger a
      # false-positive update banner, e.g. embedding 0.5.0 when latest.json is
      # 0.16.2).
      - name: Sync native app version
        id: sync-version
        env:
          RELEASE_MODE: ${{ steps.release-version.outputs.mode }}
          RELEASE_VERSION: ${{ steps.release-version.outputs.version }}
        run: bash ops/scripts/release/sync-version.sh
      - name: Check for code signing secrets
        id: check-secrets
        shell: 'sops exec-env ops/secrets/secrets.sops.json "bash -e {0}"'
        run: |
          if [ -n "$APPLE_CERTIFICATE" ]; then
            echo "has_certificate=true" >> $GITHUB_OUTPUT
          else
            echo "has_certificate=false" >> $GITHUB_OUTPUT
          fi
          if [ -n "$APPLE_API_KEY_CONTENT" ]; then
            echo "has_notarization=true" >> $GITHUB_OUTPUT
          else
            echo "has_notarization=false" >> $GITHUB_OUTPUT
          fi
      # Build the Tauri app (TAURI_SIGNING_PRIVATE_KEY + PASSWORD come from sops)
      # NOTE: Certificate import is intentionally deferred until after this step.
      # Running `security list-keychain -d user -s <keychain>` before the build
      # replaces the keychain search list and breaks DMG bundling on tag runs.
      - name: Build Tauri app
        run: |
          # unset the certificate and password so the runner can't influence the build
          export APPLE_SIGNING_IDENTITY="-"
          unset APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD KEYCHAIN_PASSWORD
          bun run desktop:build
        shell: 'sops exec-env ops/secrets/secrets.sops.json "bash -e {0}"'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Pass DSNs and build metadata into the tauri action step so build.rs can read them
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          NIXMAC_ENV: prod
          NIXMAC_VERSION: ${{ steps.sync-version.outputs.build_version }}
          VITE_SERVER_URL: ${{ secrets.VITE_SERVER_URL }}
          SUBMITTED_FEEDBACK_DSN: ${{ secrets.SUBMITTED_FEEDBACK_DSN }}

      - name: Unit Test frontend
        working-directory: apps/native
        run: bun run test:unit

      - name: Save sccache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ${{ runner.temp }}/sccache
          key: sccache-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Cargo.lock') }}

      # Import Apple Developer certificate (only for releases with secrets).
      # Placed AFTER the Tauri build to avoid replacing the keychain search list
      # before `bun run desktop:build`, which caused DMG bundling failures on tags.
      # The normalizer needs this keychain to re-sign updater archives after
      # install-name rewrites mutate the embedded app bundle.
      - name: Import Apple Developer certificate
        if: steps.check-secrets.outputs.has_certificate == 'true'
        shell: 'sops exec-env ops/secrets/secrets.sops.json "bash -e {0}"'
        run: bash ops/scripts/release/import-certificate.sh
      - name: Normalize macOS system install names
        shell: 'sops exec-env ops/secrets/secrets.sops.json "bash -e {0}"'
        run: |
          set -euo pipefail

          APP_PATH=$(find target/release/bundle/macos -name "*.app" -type d 2>/dev/null | sed -n '1p' || true)
          DMG_PATH=$(find target/release/bundle/dmg -name "*.dmg" -type f 2>/dev/null | sed -n '1p' || true)
          TAR_GZ_PATH=$(find target/release/bundle -name "*.app.tar.gz" -not -name "*.sig" -type f 2>/dev/null | sed -n '1p' || true)

          if [ -z "$APP_PATH" ] || [ -z "$DMG_PATH" ] || [ -z "$TAR_GZ_PATH" ]; then
            echo "ERROR: missing app, DMG, or updater archive for install-name normalization (APP_PATH=$APP_PATH DMG_PATH=$DMG_PATH TAR_GZ_PATH=$TAR_GZ_PATH)"
            exit 1
          fi

          bash ops/scripts/release/normalize-macos-install-names.sh "$APP_PATH" "$DMG_PATH" "$TAR_GZ_PATH"

      # Sign the app bundle (required for notarization)
      - name: Sign app bundle
        run: bash ops/scripts/release/sign-app.sh
      # Rebuild the final DMG from the signed app with pinned create-dmg.
      # Tauri copies .background/dmg-background.png, but our CI hosts have not
      # reliably emitted the root .DS_Store that Finder needs to show it. The
      # script also mount-verifies .DS_Store, .background, Applications link,
      # and the signed app before notarization/upload.
      - name: Rebuild DMG with Finder layout
        if: steps.check-secrets.outputs.has_certificate == 'true'
        run: |
          APP_PATH=$(find target/release/bundle/macos -name "*.app" -type d 2>/dev/null | sed -n '1p' || true)
          DMG_PATH=$(find target/release/bundle/dmg -name "*.dmg" -type f 2>/dev/null | sed -n '1p' || true)
          bash ops/scripts/release/rebuild-dmg-with-layout.sh "$APP_PATH" "$DMG_PATH"
      # Notarize the app (requires Apple Developer account)
      - name: Notarize app
        shell: 'sops exec-env ops/secrets/secrets.sops.json "bash -e {0}"'
        run: bash ops/scripts/release/notarize.sh
      - name: Check macOS app portability
        shell: bash
        run: |
          set -euo pipefail

          APP_PATH=$(find target/release/bundle/macos -name "*.app" -type d 2>/dev/null | sed -n '1p' || true)
          DMG_PATH=$(find target/release/bundle/dmg -name "*.dmg" -type f 2>/dev/null | sed -n '1p' || true)
          TAR_GZ_PATH=$(find target/release/bundle -name "*.app.tar.gz" -not -name "*.sig" -type f 2>/dev/null | sed -n '1p' || true)

          if [ -z "$APP_PATH" ] || [ -z "$DMG_PATH" ] || [ -z "$TAR_GZ_PATH" ]; then
            echo "ERROR: missing app, DMG, or updater archive for portability check (APP_PATH=$APP_PATH DMG_PATH=$DMG_PATH TAR_GZ_PATH=$TAR_GZ_PATH)"
            exit 1
          fi

          bash ops/scripts/release/check-portable-macos-app.sh "$APP_PATH" "$DMG_PATH" "$TAR_GZ_PATH"
      - name: Get artifact paths
        id: artifacts
        run: |
          DMG_PATH=$(find target/release/bundle/dmg -name "*.dmg" -type f 2>/dev/null | head -1 || echo "")
          APP_PATH=$(find target/release/bundle/macos -name "*.app" -type d 2>/dev/null | head -1 || echo "")

          {
            echo "dmg_path=$DMG_PATH"
            echo "app_path=$APP_PATH"
          } >> "$GITHUB_OUTPUT"

          if [ -n "$DMG_PATH" ]; then
            echo "dmg_name=$(basename "$DMG_PATH")" >> "$GITHUB_OUTPUT"
          fi
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v7
        with:
          name: nixmac-macos-dmg
          path: target/release/bundle/dmg/*.dmg
          if-no-files-found: warn
      - name: Upload app bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: nixmac-macos-app
          path: target/release/bundle/macos/*.app
          if-no-files-found: warn
          include-hidden-files: true
      # Create GitHub Release for tag pushes only. The stable channel only
      # updates when a release is created in GitHub (via a pushed v* tag);
      # main pushes land on the develop channel. Skipped for test tags
      # matching `-test.N` so we can exercise the full signing/notarization +
      # DMG swap path on a disposable tag without publishing a public release.
      - name: Create Release
        if: steps.release-version.outputs.mode == 'tag' &&
          !contains(steps.release-version.outputs.tag, '-test.')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          tag_name: ${{ steps.release-version.outputs.tag }}
          files: |
            target/release/bundle/dmg/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Upload to R2 for auto-updater (R2 creds come from sops).
      # tag → stable channel; develop (main push) → develop channel.
      # Skipped for test tags matching `-test.N` so we can exercise the full
      # signing/notarization + DMG swap path on a disposable tag without
      # overwriting latest.json on the updater CDN.
      - name: Upload to R2
        if: (steps.release-version.outputs.mode == 'tag' ||
          steps.release-version.outputs.mode == 'develop') &&
          !contains(steps.release-version.outputs.tag, '-test.')
        shell: 'sops exec-env ops/secrets/secrets.sops.json "bash -e {0}"'
        env:
          AWS_DEFAULT_REGION: auto
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ steps.release-version.outputs.version }}
          RELEASE_TAG: ${{ steps.release-version.outputs.tag }}
          UPDATE_CHANNEL: ${{ steps.release-version.outputs.mode == 'develop' && 'develop' || 'stable' }}
        run: bash ops/scripts/release/upload-r2.sh
      # Sync the shipped release to Linear so issues referenced in commits since
      # the previous release get linked. Runs only after R2 upload succeeds, so
      # Linear releases track what actually shipped. Skipped for `-test.N` tags
      # to match the GitHub Release / R2 upload skip.
      - name: Sync release to Linear
        if: steps.release-version.outputs.mode == 'tag' &&
          !contains(steps.release-version.outputs.tag, '-test.')
        uses: linear/linear-release-action@v0
        with:
          access_key: ${{ secrets.LINEAR_ACCESS_KEY }}
          version: ${{ steps.release-version.outputs.version }}
          name: nixmac v${{ steps.release-version.outputs.version }}
      - name: Cleanup keychain
        if: always()
        run: bash ops/scripts/release/cleanup-keychain.sh
