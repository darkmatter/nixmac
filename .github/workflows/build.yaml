name: Build macOS App
on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]
  workflow_dispatch:
env:
  CARGO_TERM_COLOR: always
  SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/native/src-tauri
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Setup sops
        uses: nhedger/setup-sops@v2
      - name: Setup age
        uses: alessiodionisi/setup-age-action@v1.3.0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install frontend dependencies
        run: bun install --frozen-lockfile
      # Check if code signing secrets are available
      - name: Check for code signing secrets
        id: check-secrets
        shell: 'sops exec-env .secrets.enc.yaml "bash -e {0}"'
        run: |
          if [ -n "$APPLE_CERTIFICATE" ]; then
            echo "has_certificate=true" >> $GITHUB_OUTPUT
          else
            echo "has_certificate=false" >> $GITHUB_OUTPUT
          fi
          if [ -n "$APPLE_API_KEY_CONTENT" ]; then
            echo "has_notarization=true" >> $GITHUB_OUTPUT
          else
            echo "has_notarization=false" >> $GITHUB_OUTPUT
          fi
      # Import Apple Developer certificate (only for releases with secrets)
      - name: Import Apple Developer certificate
        if: startsWith(github.ref, 'refs/tags/') && steps.check-secrets.outputs.has_certificate == 'true'
        shell: 'sops exec-env .secrets.enc.yaml "bash -e {0}"'
        # env:
        #   APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
        #   APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        #   KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create a temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import the certificate
          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
      # Build the Tauri app
      - name: Build Tauri app
        run: bun run desktop:build
        shell: 'sops exec-env .secrets.enc.yaml "bash -e {0}"'
        # env:
        # Only set signing identity if we have the certificate
        # APPLE_SIGNING_IDENTITY: ${{ startsWith(github.ref, 'refs/tags/') && steps.check-secrets.outputs.has_certificate == 'true' && secrets.APPLE_SIGNING_IDENTITY || '' }}
      # Notarize the app (requires Apple Developer account)
      - name: Notarize app
        if: startsWith(github.ref, 'refs/tags/') && steps.check-secrets.outputs.has_notarization == 'true'
        shell: 'sops exec-env .secrets.enc.yaml "bash -e {0}"'
        run: |
          # Write the API key to a file
          echo "$APPLE_API_KEY_CONTENT" > $RUNNER_TEMP/AuthKey.p8

          DMG_PATH=$(find apps/native/src-tauri/target/release/bundle/dmg -name "*.dmg" -type f | head -1)

          if [ -n "$DMG_PATH" ]; then
            echo "Notarizing $DMG_PATH..."
            xcrun notarytool submit "$DMG_PATH" \
              --key "$RUNNER_TEMP/AuthKey.p8" \
              --key-id "$APPLE_API_KEY_ID" \
              --issuer "$APPLE_API_ISSUER" \
              --wait

            # Staple the notarization ticket
            xcrun stapler staple "$DMG_PATH"
          fi

          # Clean up the key file
          rm -f $RUNNER_TEMP/AuthKey.p8
      - name: Get artifact paths
        id: artifacts
        run: |
          DMG_PATH=$(find apps/native/src-tauri/target/release/bundle/dmg -name "*.dmg" -type f 2>/dev/null | head -1 || echo "")
          APP_PATH=$(find apps/native/src-tauri/target/release/bundle/macos -name "*.app" -type d 2>/dev/null | head -1 || echo "")

          echo "dmg_path=$DMG_PATH" >> $GITHUB_OUTPUT
          echo "app_path=$APP_PATH" >> $GITHUB_OUTPUT

          if [ -n "$DMG_PATH" ]; then
            echo "dmg_name=$(basename "$DMG_PATH")" >> $GITHUB_OUTPUT
          fi
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: nixmac-macos-dmg
          path: apps/native/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: warn
      - name: Upload app bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: nixmac-macos-app
          path: apps/native/src-tauri/target/release/bundle/macos/*.app
          if-no-files-found: warn
      # Create GitHub Release for tags
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            apps/native/src-tauri/target/release/bundle/dmg/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Cleanup keychain
        if: always()
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain $KEYCHAIN_PATH || true
          fi
