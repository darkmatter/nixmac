name: CI Image

# =============================================================================
# Builds and publishes the nixmac Linux CI container image to GHCR.
# The image pre-bakes nix, cachix, sops, age, bun, node, and system deps so
# Linux jobs (typescript, treefmt, e2e) skip ~5-10 min of per-run installs.
#
# Triggers:
#   - Push to main/develop that changes Dockerfile, nix/, devenv.*, flake.*,
#     or package.json
#   - Weekly schedule (Sun 09:00 UTC) to keep the base layer fresh
#   - Manual dispatch
# =============================================================================

on:
  push:
    branches: [main, develop]
    paths:
      - .github/ci-image/**
      - .github/workflows/ci-image.yaml
      - nix/**
      - devenv.nix
      - devenv.yaml
      - devenv.lock
      - flake.nix
      - flake.lock
      - treefmt.nix
      - package.json
      - bun.lock
  schedule:
    # Sunday 09:00 UTC — weekly refresh of the base layer (ubuntu, nixpkgs).
    - cron: "0 9 * * 0"
  workflow_dispatch:

concurrency:
  group: ci-image-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/nixmac-ci

jobs:
  build:
    name: Build and push CI image
    runs-on: [self-hosted, linux]
    timeout-minutes: 30
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Read bun version from package.json
        id: bun-version
        shell: bash
        run: |
          # Extract the version from `packageManager: "bun@1.3.13"`.
          VERSION=$(jq -r '.packageManager // empty' package.json | sed -n 's/^bun@//p')
          if [ -z "$VERSION" ]; then
            echo "::error::Could not find bun version in package.json (packageManager field)"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # branch name (main, develop)
            type=ref,event=branch
            # latest on default branch
            type=raw,value=latest,enable={{is_default_branch}}
            # date+sha for traceability (e.g. 20260626-abc1234)
            type=raw,value={{date 'YYYYMMDD'}}-{{sha}}
            # schedule trigger
            type=schedule,pattern=weekly-{{date 'YYYYMMDD'}}
          labels: |
            org.opencontainers.image.title=nixmac-ci
            org.opencontainers.image.description=Linux CI image for nixmac GitHub Actions
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .github/ci-image
          file: .github/ci-image/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUN_VERSION=${{ steps.bun-version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: false

      - name: Summary
        shell: bash
        run: |
          {
            echo "## CI Image Published"
            echo ""
            echo "**Tags:**"
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
            echo ""
            echo "**Digest:** \`${{ steps.push.outputs.digest }}\`"
            echo ""
            echo "**Bun version:** \`${{ steps.bun-version.outputs.version }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
