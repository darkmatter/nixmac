version: "3.8"
services:
  postgres:
    image: postgres:latest
    restart: unless-stopped
    env_file:
      - ./apps/server/.env
    environment:
      # Use environment variables with sensible defaults
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-password}"
      POSTGRES_DB: "${POSTGRES_DB:-nixmac-postgres}"
    ports:
      - "${PG_PORT:-5432}:5432"
    volumes:
      - "nixmac-postgres-data:/var/lib/postgresql/data"
volumes:
  nixmac-postgres-data:
