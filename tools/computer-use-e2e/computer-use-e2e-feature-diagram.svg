<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1160" viewBox="0 0 1600 1160" role="img" aria-labelledby="title desc">
  <title id="title">nixmac Computer Use E2E feature diagram</title>
  <desc id="desc">A visual overview of the pull-request triggered remote Computer Use E2E lane, its setup, app-driving flow, evidence model, guardrails, adversarial validation, and outputs.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 44px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .subtitle { font: 400 21px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .lane-title { font: 700 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .section-title { font: 700 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .body { font: 400 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .body-strong { font: 700 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1e293b; }
      .small { font: 400 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .tiny { font: 700 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 8; }
      .panel { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; rx: 8; }
      .ci { fill: #eff6ff; stroke: #60a5fa; }
      .remote { fill: #ecfdf5; stroke: #34d399; }
      .runner { fill: #fff7ed; stroke: #fb923c; }
      .evidence { fill: #f5f3ff; stroke: #a78bfa; }
      .guard { fill: #fef2f2; stroke: #f87171; }
      .output { fill: #f0fdfa; stroke: #2dd4bf; }
      .arrow { fill: none; stroke: #334155; stroke-width: 2.2; marker-end: url(#arrow); }
      .arrow-soft { fill: none; stroke: #64748b; stroke-width: 1.8; stroke-dasharray: 7 7; marker-end: url(#arrow); }
      .divider { stroke: #cbd5e1; stroke-width: 1; }
      .badge { rx: 6; }
      .badge-text { font: 700 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .badge-neutral { fill: #e2e8f0; stroke: #94a3b8; }
      .shadow { filter: drop-shadow(0 1px 2px rgba(15, 23, 42, 0.12)); }
    </style>
  </defs>

  <rect class="bg" width="1600" height="1160"/>

  <text x="56" y="72" class="title">nixmac Computer Use E2E</text>
  <text x="56" y="110" class="subtitle">Remote macOS QA lane: GitHub triggers it, Codex Computer Use drives the real app, the report proves what happened.</text>

  <rect x="56" y="150" width="1488" height="76" class="panel shadow" rx="8"/>
  <text x="82" y="184" class="section-title">Core contract</text>
  <text x="82" y="211" class="body">Shell prepares state, launches the app, captures metadata, and renders reports. Computer Use drives UI interaction and inspects the final report.</text>

  <rect x="56" y="264" width="260" height="702" class="panel ci shadow"/>
  <text x="82" y="303" class="lane-title">1. GitHub entry</text>
  <rect x="82" y="332" width="208" height="114" class="card"/>
  <text x="104" y="362" class="body-strong">Triggers</text>
  <text x="104" y="392" class="body">pull_request</text>
  <text x="104" y="421" class="body">workflow_dispatch</text>
  <rect x="82" y="470" width="208" height="184" class="card"/>
  <text x="104" y="500" class="body-strong">Required inputs</text>
  <text x="104" y="530" class="body">remote host/user/key</text>
  <text x="104" y="559" class="body">pinned known_hosts</text>
  <text x="104" y="588" class="body">OpenRouter key</text>
  <text x="104" y="617" class="body">matching app artifact</text>
  <rect x="82" y="678" width="208" height="168" class="card"/>
  <text x="104" y="708" class="body-strong">PR focus metadata</text>
  <text x="104" y="738" class="body">changed files</text>
  <text x="104" y="767" class="body">user-visible paths</text>
  <text x="104" y="796" class="body">mapped scenarios</text>
  <text x="104" y="825" class="body">additive focus only</text>
  <rect x="82" y="870" width="208" height="58" class="card"/>
  <text x="104" y="906" class="body">Singleton DXU queue</text>

  <rect x="366" y="264" width="280" height="702" class="panel remote shadow"/>
  <text x="392" y="303" class="lane-title">2. Remote Mac setup</text>
  <rect x="392" y="332" width="228" height="127" class="card"/>
  <text x="414" y="362" class="body-strong">Preflight</text>
  <text x="414" y="392" class="body">SSH identity</text>
  <text x="414" y="421" class="body">Codex binary present</text>
  <text x="414" y="450" class="body">expected hostname</text>
  <rect x="392" y="483" width="228" height="200" class="card"/>
  <text x="414" y="513" class="body-strong">Disposable fixture</text>
  <text x="414" y="543" class="body">stage PR-built .app</text>
  <text x="414" y="572" class="body">backup app support</text>
  <text x="414" y="601" class="body">copy template config</text>
  <text x="414" y="630" class="body">seed provider settings</text>
  <text x="414" y="659" class="body">enable confirmations</text>
  <rect x="392" y="707" width="228" height="139" class="card"/>
  <text x="414" y="737" class="body-strong">Activation safety</text>
  <text x="414" y="767" class="body">temporary auth policy</text>
  <text x="414" y="796" class="body">disable sudo_local</text>
  <text x="414" y="825" class="body">cleanup must restore</text>
  <rect x="392" y="870" width="228" height="58" class="card"/>
  <text x="414" y="906" class="body">Launch app + app-server</text>

  <rect x="696" y="264" width="440" height="702" class="panel runner shadow"/>
  <text x="722" y="303" class="lane-title">3. Computer Use drives nixmac</text>
  <rect x="722" y="332" width="388" height="94" class="card"/>
  <text x="744" y="362" class="body-strong">App shell and support surfaces</text>
  <text x="744" y="392" class="body">launch, update banner, Settings, History</text>
  <text x="744" y="417" class="body">Console, Feedback, Report Issue</text>
  <rect x="722" y="450" width="388" height="94" class="card"/>
  <text x="744" y="480" class="body-strong">Pre-prompt save lanes</text>
  <text x="744" y="510" class="body">Homebrew and macOS customization chips</text>
  <text x="744" y="535" class="body">save, commit, then restore when visible</text>
  <rect x="722" y="568" width="388" height="136" class="card"/>
  <text x="744" y="598" class="body-strong">Default evolved case</text>
  <text x="744" y="628" class="body">homebrew-bat real provider prompt</text>
  <text x="744" y="657" class="body">Review -> Summary -> Diff</text>
  <text x="744" y="686" class="body">Build &amp; Test boundary</text>
  <rect x="722" y="728" width="388" height="136" class="card"/>
  <text x="744" y="758" class="body-strong">Safe full lifecycle</text>
  <text x="744" y="788" class="body">confirm Build only in proven disposable state</text>
  <text x="744" y="817" class="body">Commit Step 3, verify git proof</text>
  <text x="744" y="846" class="body">History restore returns baseline</text>
  <rect x="722" y="888" width="388" height="40" class="card"/>
  <text x="744" y="914" class="body">Report inspection also uses Computer Use</text>

  <rect x="1186" y="264" width="358" height="702" class="panel evidence shadow"/>
  <text x="1212" y="303" class="lane-title">4. Evidence and report</text>
  <rect x="1212" y="332" width="306" height="153" class="card"/>
  <text x="1234" y="362" class="body-strong">Artifacts per run</text>
  <text x="1234" y="392" class="body">index.html, state.json</text>
  <text x="1234" y="421" class="body">events.json</text>
  <text x="1234" y="450" class="body">screenshots, redacted text</text>
  <text x="1234" y="479" class="body">evidence video, metadata</text>
  <rect x="1212" y="509" width="306" height="181" class="card"/>
  <text x="1234" y="539" class="body-strong">Reviewer model</text>
  <text x="1234" y="569" class="body">V2 scenario contracts</text>
  <text x="1234" y="598" class="body">evidence strength</text>
  <text x="1234" y="627" class="body">failure taxonomy</text>
  <text x="1234" y="656" class="body">accessibility risk</text>
  <text x="1234" y="685" class="body">visual proof cards</text>
  <rect x="1212" y="714" width="306" height="156" class="card"/>
  <text x="1234" y="744" class="body-strong">Freshness checks</text>
  <text x="1234" y="774" class="body">coverage manifest maps main</text>
  <text x="1234" y="803" class="body">PR-specific focus is surfaced</text>
  <text x="1234" y="832" class="body">coverage gaps stay near top</text>
  <rect x="1212" y="876" width="306" height="78" class="card"/>
  <text x="1234" y="904" class="body">Verdict: pass / fail / inconclusive</text>
  <text x="1234" y="928" class="small">Missing secrets render an</text>
  <text x="1234" y="946" class="small">unavailable / inconclusive report</text>

  <path d="M 316 615 L 358 615" class="arrow"/>
  <path d="M 646 615 L 688 615" class="arrow"/>
  <path d="M 1136 615 L 1178 615" class="arrow"/>

  <rect x="56" y="996" width="460" height="132" class="panel guard shadow"/>
  <text x="82" y="1027" class="section-title">Adversarial harness</text>
  <text x="82" y="1056" class="body">Replays a known-good report, injects bad evidence/state,</text>
  <text x="82" y="1081" class="body">and requires the report to catch false-green failures.</text>

  <rect x="570" y="996" width="460" height="132" class="panel guard shadow"/>
  <text x="596" y="1027" class="section-title">Safety guardrails</text>
  <text x="596" y="1056" class="body">No production config mutation</text>
  <text x="596" y="1081" class="body">Build, Commit, and Rollback run only</text>
  <text x="596" y="1105" class="small">inside a disposable git repo with explicit gates.</text>

  <rect x="1084" y="996" width="460" height="132" class="panel output shadow"/>
  <text x="1110" y="1027" class="section-title">Published outputs</text>
  <text x="1110" y="1050" class="body">gh-pages/htmlpreview report</text>
  <text x="1110" y="1074" class="body">Actions artifact backup</text>
  <text x="1110" y="1095" class="small">Non-blocking unless required</text>
  <text x="1110" y="1113" class="small">in branch protection</text>

  <path d="M 1365 966 C 1320 990 430 972 314 991" class="arrow-soft"/>
  <path d="M 916 966 C 916 988 800 974 800 991" class="arrow-soft"/>
  <path d="M 1365 966 L 1365 989" class="arrow-soft"/>

  <rect x="107" y="238" width="112" height="24" class="badge badge-neutral"/>
  <text x="121" y="256" class="badge-text">PR lane</text>
  <rect x="448" y="238" width="115" height="24" class="badge badge-neutral"/>
  <text x="462" y="256" class="badge-text">DXU Mac</text>
  <rect x="852" y="238" width="126" height="24" class="badge badge-neutral"/>
  <text x="866" y="256" class="badge-text">Real app</text>
  <rect x="1300" y="238" width="130" height="24" class="badge badge-neutral"/>
  <text x="1314" y="256" class="badge-text">Proof first</text>
</svg>
